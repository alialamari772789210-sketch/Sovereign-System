<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الرصد السيادي المطور - تتبع المسار</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050a14; color: #00f2ff; margin: 0; overflow: hidden; }
        .radar-screen { width: 320px; height: 320px; border-radius: 50%; border: 2px solid rgba(0, 242, 255, 0.2); position: relative; background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 75%); }
        .radar-sweep { position: absolute; width: 50%; height: 50%; top: 0; left: 50%; background: linear-gradient(45deg, rgba(0, 242, 255, 0.3) 0%, transparent 70%); transform-origin: bottom left; animation: sweep 3s linear infinite; border-left: 1px solid rgba(0, 242, 255, 0.6); }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .target-blip { position: absolute; width: 6px; height: 6px; background: #ff3e3e; border-radius: 50%; box-shadow: 0 0 12px #ff3e3e; animation: blink 1s infinite; }
        .target-trail { position: absolute; width: 2px; height: 40px; background: linear-gradient(to top, #ff3e3e, transparent); transform-origin: bottom; opacity: 0.4; }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } }
        .distance-label { position: absolute; font-size: 8px; color: rgba(0, 242, 255, 0.4); font-weight: bold; }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen" onload="initiateRadar()">
    <header class="w-full flex justify-between items-center mb-6 border-b border-cyan-500/20 pb-3">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-cyan-400">radar</span>
            <h1 class="text-[10px] font-black tracking-widest uppercase">SOVEREIGN RADAR v7.2 | الرصد المطور</h1>
        </div>
        <div id="range-indicator" class="text-[9px] font-mono text-white bg-red-600/40 px-2 py-0.5 rounded border border-red-500/30">RANGE: 150KM</div>
    </header>

    <div class="radar-screen mb-6 shadow-[0_0_50px_rgba(0,242,255,0.1)]">
        <div class="radar-sweep"></div>
        
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="border border-cyan-500/10 rounded-full w-[80px] h-[80px]"></div>
            <div class="border border-cyan-500/10 rounded-full w-[160px] h-[160px]"></div>
            <div class="border border-cyan-500/10 rounded-full w-[240px] h-[240px]"></div>
            <div class="border border-cyan-500/30 rounded-full w-full h-full"></div>
            
            <span class="distance-label top-[10%]">150km</span>
            <span class="distance-label top-[23%]">125km</span>
            <span class="distance-label top-[38%]">75km</span>
        </div>

        <div class="absolute h-full w-[1px] bg-cyan-500/10 left-1/2"></div>
        <div class="absolute w-full h-[1px] bg-cyan-500/10 top-1/2"></div>

        <div id="target-alpha" class="target-blip top-[30%] left-[40%]"></div>
        <div class="target-trail top-[30%] left-[41.5%] rotate-[15deg]"></div>
    </div>

    <div class="w-full grid grid-cols-2 gap-3 mb-6">
        <div class="bg-slate-900/60 p-3 rounded border border-cyan-500/20">
            <div class="text-[8px] opacity-50 uppercase">Target Velocity</div>
            <div class="text-xs font-bold text-cyan-400 font-mono">MACH 2.4</div>
        </div>
        <div class="bg-slate-900/60 p-3 rounded border border-cyan-500/20">
            <div class="text-[8px] opacity-50 uppercase">Tracking Status</div>
            <div class="text-xs font-bold text-red-500 font-mono animate-pulse">LOCKED</div>
        </div>
    </div>

    <div class="w-full space-y-2">
        <button onclick="toggleRange()" class="w-full py-4 bg-cyan-600/10 border border-cyan-500/30 text-cyan-400 font-bold text-[10px] uppercase tracking-widest rounded hover:bg-cyan-500/20 transition-all">
            Switch Range (150km / 125km)
        </button>
        <button onclick="triggerIntercept()" class="w-full py-4 bg-red-600/20 border border-red-500/40 text-red-400 font-bold text-[10px] uppercase tracking-widest rounded hover:bg-red-600/30 transition-all">
            Initiate Target Intercept
        </button>
    </div>

    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-2 bg-slate-950/90 backdrop-blur-2xl border-t border-cyan-500/20">
        <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center justify-center text-cyan-400/50">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[10px] uppercase font-bold">DASHBOARD</span>
        </button>
        <div class="flex flex-col items-center justify-center text-black bg-cyan-400 rounded-sm py-1 px-3 shadow-[0_0_12px_#00f2ff]">
            <span class="material-symbols-outlined">radar</span>
            <span class="text-[10px] uppercase font-bold">RADAR</span>
        </div>
        <button onclick="window.location.href='setup.html'" class="flex flex-col items-center justify-center text-cyan-400/50">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] uppercase font-bold">SETUP</span>
        </button>
    </nav>

    <script>
        let currentRange = 150;

        function initiateRadar() {
            const msg = "تم تفعيل رادار الرصد السيادي المطور. مديات مئة وخمسين كيلومتر نشطة الآن. جاري تتبع المسار البياني للأهداف.";
            speak(msg);
        }

        function toggleRange() {
            currentRange = (currentRange === 150) ? 125 : 150;
            document.getElementById('range-indicator').innerText = `RANGE: ${currentRange}KM`;
            speak(`تم تغيير المدى العملياتي إلى مئتين ${currentRange} كيلومتر.`);
        }

        function triggerIntercept() {
            speak("تحذير. تم تفعيل بروتوكول الاعتراض. تتبع المسار البياني للهدف تحت السيطرة النارية.");
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
