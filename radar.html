<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الرصد السيادي - مدى 300كم | Stealth Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #04080f; color: #00f2ff; margin: 0; overflow: hidden; }
        .radar-container { width: 340px; height: 340px; border-radius: 50%; border: 1px solid rgba(0, 242, 255, 0.15); position: relative; background: radial-gradient(circle, rgba(0, 242, 255, 0.03) 0%, transparent 80%); transition: all 0.5s; }
        .radar-sweep { position: absolute; width: 50%; height: 50%; top: 0; left: 50%; background: linear-gradient(45deg, rgba(0, 242, 255, 0.2) 0%, transparent 60%); transform-origin: bottom left; animation: sweep 4s linear infinite; border-left: 1px solid rgba(0, 242, 255, 0.4); }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .zero-emission { filter: grayscale(1) brightness(0.5); opacity: 0.7; }
        .target-node { position: absolute; width: 8px; height: 8px; background: #ff004c; border-radius: 50%; box-shadow: 0 0 15px #ff004c; animation: pulse-target 1.5s infinite; }
        @keyframes pulse-target { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.3); } }
        .distance-ring { border: 1px solid rgba(0, 242, 255, 0.08); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen" onload="bootRadar()">
    
    <header class="w-full flex justify-between items-center mb-6 border-b border-cyan-500/10 pb-3">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-cyan-400">radar</span>
            <h1 class="text-[10px] font-black tracking-[0.2em] uppercase">Sovereign Radar v7.2.5</h1>
        </div>
        <div id="emission-status" class="text-[8px] font-bold px-2 py-1 rounded border border-cyan-500/30 bg-cyan-950/20">EMISSION: ACTIVE</div>
    </header>

    <div class="radar-container mb-8 shadow-[0_0_60px_rgba(0,242,255,0.05)]" id="radar-screen">
        <div class="radar-sweep" id="sweeper"></div>
        
        <div class="distance-ring w-full h-full"></div>
        <div class="distance-ring w-[266px] h-[266px]"></div> <div class="distance-ring w-[133px] h-[133px]"></div> <div class="absolute top-[2%] left-1/2 -translate-x-1/2 text-[8px] font-mono opacity-40">300KM</div>
        <div class="absolute top-[12%] left-1/2 -translate-x-1/2 text-[8px] font-mono opacity-40">200KM</div>
        
        <div class="target-node top-[25%] left-[65%]" id="target-1"></div>
        <div class="absolute top-[26%] left-[68%] text-[7px] font-mono text-red-500">TGT_01: 240KM</div>
    </div>

    <div class="w-full max-w-sm space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-slate-900/40 border border-cyan-500/10 p-3 rounded">
                <div class="text-[8px] opacity-50 uppercase mb-1">Max Range</div>
                <div class="text-lg font-black text-cyan-400">300 KM</div>
            </div>
            <div class="bg-slate-900/40 border border-cyan-500/10 p-3 rounded">
                <div class="text-[8px] opacity-50 uppercase mb-1">Scanning Mode</div>
                <div id="mode-text" class="text-lg font-black text-green-400">ULTRA-WIDE</div>
            </div>
        </div>

        <div class="space-y-2">
            <button onclick="toggleZeroEmission()" id="emission-btn" class="w-full py-4 bg-cyan-900/20 border border-cyan-500/40 text-cyan-400 font-black text-[10px] uppercase tracking-widest rounded transition-all">
                Activate Zero Emission Mode
            </button>
            <button onclick="triggerTracking()" class="w-full py-4 bg-red-900/20 border border-red-500/40 text-red-400 font-black text-[10px] uppercase tracking-widest rounded hover:bg-red-900/40 transition-all">
                Initiate Target Lock-On
            </button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-2 bg-[#04080f]/95 backdrop-blur-xl border-t border-cyan-500/10">
        <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center text-cyan-400/40">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[9px] font-bold uppercase">Main</span>
        </button>
        <div class="flex flex-col items-center text-black bg-cyan-400 px-4 py-1 rounded shadow-[0_0_15px_#00f2ff]">
            <span class="material-symbols-outlined">radar</span>
            <span class="text-[9px] font-black uppercase">RADAR</span>
        </div>
        <button onclick="window.location.href='geofence.html'" class="flex flex-col items-center text-cyan-400/40">
            <span class="material-symbols-outlined">map</span>
            <span class="text-[9px] font-bold uppercase">Geofence</span>
        </button>
    </nav>

    <script>
        let isZeroEmission = false;

        function bootRadar() {
            const msg = "تم تفعيل رادار الرصد السيادي المطور بمدى ثلاثمائة كيلومتر. وضع الانبعاث الصفري متاح الآن للعمليات الصامتة.";
            speak(msg);
        }

        function toggleZeroEmission() {
            isZeroEmission = !isZeroEmission;
            const screen = document.getElementById('radar-screen');
            const status = document.getElementById('emission-status');
            const btn = document.getElementById('emission-btn');
            const sweeper = document.getElementById('sweeper');

            if(isZeroEmission) {
                screen.classList.add('zero-emission');
                status.innerText = "EMISSION: ZERO / STEALTH";
                status.classList.replace('bg-cyan-950/20', 'bg-red-950/40');
                btn.innerText = "Deactivate Zero Emission";
                sweeper.style.animationDuration = "8s"; // مسح أبطأ لتقليل الانبعاثات
                speak("تم تفعيل وضع الانبعاث الصفري. الرصد الآن في نمط التخفي المطلق.");
            } else {
                screen.classList.remove('zero-emission');
                status.innerText = "EMISSION: ACTIVE";
                status.classList.replace('bg-red-950/40', 'bg-cyan-950/20');
                btn.innerText = "Activate Zero Emission Mode";
                sweeper.style.animationDuration = "4s";
                speak("تم إلغاء وضع التخفي. الرادار يعمل بكامل القدرة الإشعاعية.");
            }
        }

        function triggerTracking() {
            speak("تحذير: تم قفل الهدف على مدى مئتين وأربعين كيلومتراً. جاري تتبع المسار التكتيكي.");
        }

        function speak(txt) {
            const u = new SpeechSynthesisUtterance(txt);
            u.lang = 'ar-SA';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
