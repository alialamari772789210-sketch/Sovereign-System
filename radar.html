<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL RADAR | AEGIS ACTIVE SCAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020508; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        .radar-circle { position: relative; width: 300px; height: 300px; border: 2px solid #00ff41; border-radius: 50%; margin: 20px auto; background: radial-gradient(circle, #0a2d0a 0%, #020508 80%); }
        .sweeper { position: absolute; top: 50%; left: 50%; width: 50%; height: 2px; background: linear-gradient(to right, transparent, #00ff41); transform-origin: left; animation: sweep 4s linear infinite; display: none; }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .active-scan .sweeper { display: block; }
        .btn-status { transition: all 0.3s; shadow: 0 0 15px rgba(0,255,65,0.2); }
    </style>
</head>
<body class="p-6 text-center">

    <div class="mb-4">
        <h2 class="text-xs font-black tracking-widest uppercase">Aegis Tactical Radar</h2>
        <p id="geo-info" class="text-[10px] text-yellow-500 uppercase">Sector: Loading...</p>
    </div>

    <div id="radarContainer" class="radar-circle">
        <div class="sweeper"></div>
        <div id="target" class="hidden absolute w-3 h-3 bg-red-600 rounded-full shadow-[0_0_15px_red] animate-pulse" style="top:30%; left:60%;"></div>
    </div>

    <div class="space-y-4 mt-6">
        <button id="toggleBtn" onclick="toggleRadar()" class="w-full py-4 bg-red-900/40 border border-red-500 text-red-500 font-black rounded-lg btn-status uppercase">
            Start Radar Scan
        </button>

        <div id="statusLog" class="text-[10px] font-mono h-12 overflow-hidden opacity-70">
            > SYSTEM IDLE...
        </div>
    </div>

    <script>
        let isActive = false;
        let scanInterval;

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function toggleRadar() {
            isActive = !isActive;
            const btn = document.getElementById('toggleBtn');
            const container = document.getElementById('radarContainer');
            const log = document.getElementById('statusLog');
            const sector = localStorage.getItem('active_sector') || "القطاع المركزي";

            if (isActive) {
                btn.innerText = "Stop Radar Scan";
                btn.className = "w-full py-4 bg-green-600 text-black font-black rounded-lg btn-status uppercase shadow-[0_0_20px_#00ff41]";
                container.classList.add('active-scan');
                log.innerHTML = "> SCANNING FREQUENCIES...<br>> ENCRYPTION ACTIVE";
                speak("تم تفعيل الرادار التكتيكي. جاري المسح الميداني في " + sector);
                
                // محاكاة رصد هدف كل 15 ثانية
                scanInterval = setInterval(() => {
                    detectTarget(sector);
                }, 15000);
            } else {
                btn.innerText = "Start Radar Scan";
                btn.className = "w-full py-4 bg-red-900/40 border border-red-500 text-red-500 font-black rounded-lg btn-status uppercase";
                container.classList.remove('active-scan');
                clearInterval(scanInterval);
                document.getElementById('target').classList.add('hidden');
                speak("تم إيقاف تشغيل المنظومة.");
            }
        }

        function detectTarget(sector) {
            if (!isActive) return;
            const distance = Math.floor(Math.random() * 250) + 10; // مسافة عشوائية
            const target = document.getElementById('target');
            target.classList.remove('hidden');
            
            // التنبيه الصوتي الذي طلبته
            const alertMsg = `سيادة العقيد، تنبيه، تم رصد هدف على مسافة ${distance} كيلومتر فوق منطقة ${sector}`;
            speak(alertMsg);

            document.getElementById('statusLog').innerHTML = `> TARGET DETECTED: ${distance}KM<br>> SECTOR: ${sector}`;
        }

        window.onload = () => {
            const sector = localStorage.getItem('active_sector') || "CENTRAL_SECTOR";
            document.getElementById('geo-info').innerText = `Sector: ${sector}`;
        };
    </script>
</body>
</html>
