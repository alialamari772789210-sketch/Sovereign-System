<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار الربط الفضائي المحدث - المنظومة السيادية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050a14; color: #00f2ff; margin: 0; overflow: hidden; }
        .radar-container { width: 300px; height: 300px; border-radius: 50%; border: 2px solid rgba(0, 242, 255, 0.3); position: relative; background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%); }
        .radar-sweep { position: absolute; width: 50%; height: 50%; top: 0; left: 50%; background: linear-gradient(45deg, rgba(0, 242, 255, 0.4) 0%, transparent 70%); transform-origin: bottom left; animation: sweep 4s linear infinite; border-left: 1px solid rgba(0, 242, 255, 0.8); }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .blip { position: absolute; width: 8px; height: 8px; background: #ff3e3e; border-radius: 50%; box-shadow: 0 0 10px #ff3e3e; animation: blink 1.5s infinite; cursor: pointer; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .distance-ring { position: absolute; border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 50%; transform: translate(-50%, -50%); top: 50%; left: 50%; }
        .danger-alert { animation: bg-danger 0.5s infinite; }
        @keyframes bg-danger { 0% { background-color: transparent; } 50% { background-color: rgba(255, 0, 0, 0.05); } 100% { background-color: transparent; } }
    </style>
</head>
<body class="flex flex-col items-center p-6 min-h-screen" id="radar-body">
    <header class="w-full flex justify-between items-center mb-6 border-b border-cyan-500/20 pb-4">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-cyan-400">radar</span>
            <h1 class="text-[10px] font-black tracking-widest uppercase">TACTICAL RADAR v2.0 | النسخة الصوتية</h1>
        </div>
        <div id="sat-status" class="text-[9px] font-mono text-cyan-400 bg-cyan-950/40 px-2 py-1 rounded border border-cyan-500/20">
            SATELLITE LINK: ACTIVE
        </div>
    </header>

    <div class="radar-container mb-8 shadow-[0_0_40px_rgba(0,242,255,0.05)]" onclick="triggerDetection()">
        <div class="radar-sweep"></div>
        <div class="distance-ring w-[100px] h-[100px]"></div>
        <div class="distance-ring w-[200px] h-[200px]"></div>
        <div class="distance-ring w-[300px] h-[300px]"></div>
        <div class="absolute h-full w-[1px] bg-cyan-500/20 left-1/2"></div>
        <div class="absolute w-full h-[1px] bg-cyan-500/20 top-1/2"></div>
        
        <div class="blip top-[25%] left-[35%]" onclick="triggerDanger()"></div>
        <div class="blip top-[55%] left-[70%]"></div>
    </div>

    <div class="w-full space-y-3 mb-6">
        <div class="bg-slate-900/80 p-3 border border-cyan-500/20 rounded">
            <div class="text-[10px] opacity-50 uppercase mb-1">حالة الرصد الحالية</div>
            <div id="radar-log" class="text-xs font-bold text-cyan-400 italic">نظام الرصد في وضع الاستعداد...</div>
        </div>
    </div>

    <div class="w-full grid grid-cols-1 gap-3">
        <button onclick="triggerEngagement()" class="w-full py-4 bg-red-600/20 border border-red-500/40 text-red-400 font-bold text-[10px] uppercase tracking-widest rounded hover:bg-red-600/40 transition-all">
            Engagement Protocol / بروتوكول الاشتباك
        </button>
        <button onclick="triggerControl()" class="w-full py-4 bg-cyan-600/20 border border-cyan-500/40 text-cyan-400 font-bold text-[10px] uppercase tracking-widest rounded hover:bg-cyan-600/40 transition-all">
            Full Sector Control / سيطرة كاملة على القطاع
        </button>
    </div>

    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-2 bg-slate-950/90 backdrop-blur-2xl border-t border-cyan-500/20">
        <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center justify-center text-cyan-400/50">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[10px] uppercase font-bold">DASHBOARD</span>
        </button>
        <div class="flex flex-col items-center justify-center text-black bg-cyan-400 rounded-sm py-1 px-3 shadow-[0_0_12px_#00f2ff]">
            <span class="material-symbols-outlined">radar</span>
            <span class="text-[10px] uppercase font-bold">RADAR</span>
        </div>
        <button onclick="window.location.href='setup.html'" class="flex flex-col items-center justify-center text-cyan-400/50">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] uppercase font-bold">SETUP</span>
        </button>
    </nav>

    <script>
        // دالة النطق الموحدة
        function speakTactical(text) {
            window.speechSynthesis.cancel(); // إلغاء أي نداء سابق
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            msg.rate = 1.0;
            msg.pitch = 0.9;
            window.speechSynthesis.speak(msg);
            document.getElementById('radar-log').innerText = text;
        }

        // 1. نداء عند الرصد (يحدث عند النقر على الرادار)
        function triggerDetection() {
            speakTactical("تم رصد تحركات مشبوهة في النطاق العملياتي. جاري تحليل الأهداف.");
        }

        // 2. نداء الخطر (عند النقر على النقاط الحمراء)
        function triggerDanger() {
            document.getElementById('radar-body').classList.add('danger-alert');
            speakTactical("تحذير. خطر داهم يقترب من منطقة المركز. تفعيل أنظمة الدفاع التنبؤية.");
            setTimeout(() => {
                document.getElementById('radar-body').classList.remove('danger-alert');
            }, 3000);
        }

        // 3. نداء بروتوكول الاشتباك
        function triggerEngagement() {
            speakTactical("تم تفعيل بروتوكول الاشتباك التكتيكي. الأهداف تحت السيطرة النارية الآن.");
        }

        // 4. نداء السيطرة
        function triggerControl() {
            speakTactical("تمت السيطرة الكاملة على القطاع. الربط الفضائي مستقر بنسبة مئة في المئة.");
        }
    </script>
</body>
</html>
