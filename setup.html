<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ضبط النطاق السيادي | AEGIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050a0f; color: #00f2ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .cyber-card { background: rgba(13, 19, 33, 0.8); border: 1px solid #00f2ff33; backdrop-filter: blur(10px); }
        .glow-border { border: 1px solid #00f2ff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .input-cyber { background: rgba(0, 242, 255, 0.05); border: 1px solid #00f2ff44; color: white; padding: 10px; border-radius: 5px; width: 100%; text-align: center; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-4" onload="initVoice()">

    <div class="flex justify-between items-center mb-6 border-b border-cyan-900 pb-2">
        <span class="text-xs font-bold tracking-widest">Sovereign Geo-Fence v2.0</span>
        <span class="text-cyan-400">🛡️</span>
    </div>

    <main class="flex-1 flex flex-col gap-6">
        <div class="cyber-card p-4 rounded-lg text-center">
            <h1 class="text-xl font-black mb-1">بروتوكول حصر النطاق الميداني</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">Field Sector Localization</p>
        </div>

        <div class="cyber-card p-6 rounded-xl flex flex-col gap-4 glow-border">
            <div>
                <label class="text-[10px] block mb-2 opacity-70">اسم المنطقة / القطاع</label>
                <input type="text" id="regionName" class="input-cyber" placeholder="أدخل اسم المنطقة (مثلاً: الضالع)">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] block mb-2 opacity-70">خط العرض (N)</label>
                    <input type="text" id="lat" class="input-cyber" value="13.9617">
                </div>
                <div>
                    <label class="text-[10px] block mb-2 opacity-70">خط الطول (E)</label>
                    <input type="text" id="lng" class="input-cyber" value="44.7314">
                </div>
            </div>

            <div>
                <label class="text-[10px] block mb-2 opacity-70">المدى العملياتي (كم)</label>
                <input type="number" id="range" class="input-cyber" value="50">
            </div>
        </div>

        <div class="p-4 bg-red-900/20 border border-red-500/30 rounded-lg text-[11px] text-red-400">
            <strong>تنبيه سيادي:</strong> ستتوقف المنظومة تلقائياً عن العمل وتفعل بروتوكول التدمير الذاتي للبيانات في حال خروج الجهاز عن النطاق المحدد أعلاه.
        </div>

        <button onclick="activateFence()" class="mt-auto bg-cyan-600 hover:bg-cyan-500 text-black font-black py-4 rounded-lg shadow-lg transition-all uppercase tracking-widest">
            تفعيل القفل الجغرافي والربط
        </button>
    </main>

    <script>
        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);
        }

        function initVoice() {
            // نداء التوجيه للقائد عند فتح الصفحة
            setTimeout(() => {
                speak("سيادة العقيد، عليك القيام بضبط المنطقة الجغرافية المحددة ليتم حصر عمل المنظومة في القطاع والمدى الذي تعينه.");
            }, 1000);
        }

        function activateFence() {
            const region = document.getElementById('regionName').value;
            if(!region) {
                speak("عذراً سيادة العقيد، يرجى تحديد اسم المنطقة أولاً.");
                return;
            }
            
            speak(`تم اعتماد النطاق الجغرافي لقطاع ${region}. المنظومة الآن محصورة في هذا المدى. أي خروج عن الإحداثيات سيؤدي للإغلاق الفوري.`);
            
            // تخزين البيانات محلياً للمنظومة
            localStorage.setItem('active_sector', region);
            
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 4000);
        }
    </script>
</body>
</html>
