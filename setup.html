<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهيئة النطاق الميداني - 300KM RANGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #020617; 
            color: #00f2ff; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .setup-container {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(20px);
        }
        .range-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(0, 242, 255, 0.1);
            border-radius: 5px;
            outline: none;
        }
        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #00f2ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #00f2ff;
        }
        .input-field {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 242, 255, 0.2);
            color: #00f2ff;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: #00f2ff;
            background: rgba(0, 242, 255, 0.05);
        }
    </style>
</head>
<body class="p-6 justify-center items-center" onload="initializeSetup()">

    <div class="setup-container w-full max-w-md p-8 rounded-3xl border-b-4 border-cyan-500 shadow-2xl">
        <div class="mb-8 text-center">
            <span class="material-symbols-outlined text-5 antiquity text-cyan-400 mb-2">settings_input_component</span>
            <h1 class="text-xl font-black uppercase tracking-tighter">تهيئة النطاق العملياتي</h1>
            <p class="text-[9px] opacity-50 tracking-[0.3em] uppercase">Field Range Initialization</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-bold opacity-60 uppercase block mb-2 tracking-widest">اسم القطاع الميداني / Sector Name</label>
                <input type="text" id="sector-name" placeholder="مثال: الضالع - جبهة قعطبة" 
                    class="input-field w-full p-4 rounded-xl outline-none font-bold text-center">
            </div>

            <div class="p-4 bg-black/20 rounded-xl border border-white/5">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold opacity-60 uppercase">المدى الأقصى للرصد</span>
                    <span id="range-val" class="text-lg font-black text-cyan-400">300 KM</span>
                </div>
                <input type="range" min="50" max="300" value="300" class="range-slider" id="range-input" oninput="updateRange(this.value)">
                <div class="flex justify-between text-[8px] opacity-40 mt-2 font-mono">
                    <span>50KM</span>
                    <span>150KM</span>
                    <span>300KM</span>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="fetchCoordinates()" class="flex-1 py-3 bg-cyan-900/20 border border-cyan-500/30 rounded-xl text-[10px] font-bold uppercase flex items-center justify-center gap-2 hover:bg-cyan-900/40 transition-all">
                    <span class="material-symbols-outlined text-sm">satellite_alt</span> ربط GPS
                </button>
                <div id="coords-display" class="flex-1 bg-black/40 rounded-xl flex items-center justify-center text-[9px] font-mono opacity-50 border border-white/5">
                    COORDS: PENDING
                </div>
            </div>

            <button onclick="finalizeAndBoot()" class="w-full py-5 bg-cyan-500 text-black font-black uppercase tracking-[0.3em] text-xs rounded-xl shadow-[0_10px_20px_rgba(0,242,255,0.2)] active:scale-95 transition-all">
                تثبيت النطاق وبدء الرصد
            </button>
        </div>
    </div>

    <script>
        function initializeSetup() {
            const msg = "سيادة العقيد علي العماري، يرجى ضبط النطاق الجغرافي. تم تحديد المدى الأقصى افتراضياً عند ثلاثمائة كيلومتر لضمان التغطية السيادية الكاملة.";
            speak(msg);
        }

        function updateRange(v) {
            document.getElementById('range-val').innerText = v + " KM";
        }

        function fetchCoordinates() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    const lat = p.coords.latitude.toFixed(4);
                    const lon = p.coords.longitude.toFixed(4);
                    document.getElementById('coords-display').innerText = `LAT:${lat} LON:${lon}`;
                    speak("تم استقبال إحداثيات الموقع وتأمين الرابط الفضائي.");
                });
            }
        }

        function finalizeAndBoot() {
            const sector = document.getElementById('sector-name').value;
            const range = document.getElementById('range-input').value;

            if (!sector) {
                speak("يرجى تسمية قطاع العمليات أولاً.");
                return;
            }

            // تخزين البيانات للانتقال للوحة القيادة
            localStorage.setItem('field_sector', sector);
            localStorage.setItem('field_range', range);

            speak(`تم تثبيت المدى عند ${range} كيلومتر في قطاع ${sector}. المنظومة السيادية في حالة تشغيل كاملة.`);
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2500);
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'ar-SA';
            u.rate = 0.95;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
