<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعداد المنظومة السيادية V4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #080e1c; color: #00f2ff; margin: 0; }
        .cyber-card { background: rgba(13, 19, 33, 0.7); border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(20px); }
        .btn-deploy { background: #00f2ff; color: #080e1c; font-weight: 900; width: 100%; padding: 20px; border-radius: 4px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }
    </style>
</head>
<body class="flex flex-col min-h-screen" onload="initSetup()">
    <header class="flex justify-between items-center px-6 h-16 border-b border-cyan-500/20 bg-[#080e1c]/90 sticky top-0">
        <div class="flex items-center gap-2 text-cyan-400">
            <span class="material-symbols-outlined">security</span>
            <h1 class="text-sm font-bold tracking-widest uppercase">SOVEREIGN_OS_V4.0</h1>
        </div>
    </header>

    <main class="flex-1 p-6 flex flex-col gap-8">
        <div class="text-center py-4 border-b border-cyan-500/10 pb-8">
            <h2 class="text-4xl font-black text-cyan-400 leading-tight uppercase italic">SYSTEM SETUP</h2>
            <p class="text-xl opacity-80 font-bold">إعداد المدى والمنطقة</p>
        </div>

        <div class="space-y-6">
            <div class="cyber-card p-6 rounded border-l-4 border-cyan-400">
                <label class="text-[10px] font-bold text-cyan-400 uppercase block mb-2">منطقة العمليات</label>
                <input type="text" id="regionName" placeholder="الضالع - مديرية قعطبة" class="bg-transparent border-none outline-none w-full text-xl font-bold text-white">
            </div>

            <div class="cyber-card p-6 rounded border-l-4 border-cyan-400">
                <div class="flex justify-between items-center mb-4">
                    <label class="text-[10px] font-bold text-cyan-400 uppercase">المدى المعتمد</label>
                    <div class="text-2xl font-black text-cyan-400 italic">300 KM</div>
                </div>
                <div class="h-1.5 bg-slate-800 rounded-full relative">
                    <div class="absolute h-full w-full bg-cyan-400"></div>
                </div>
            </div>

            <button class="btn-deploy flex items-center justify-center gap-4" onclick="deploySystem()">
                <span class="text-xl font-black uppercase">نشر المنظومة | DEPLOY</span>
                <span class="material-symbols-outlined animate-bounce">bolt</span>
            </button>
        </div>
    </main>

    <script>
        function initSetup() { speak("سيادة العقيد، يرجى تثبيت منطقة العمليات لتفعيل مديات الرصد."); }
        function deploySystem() {
            const region = document.getElementById('regionName').value;
            if(region !== "") {
                localStorage.setItem('field_sector', region);
                speak(`تم نشر المنظومة بنجاح في قطاع ${region}.`);
                setTimeout(() => { window.location.href = "dashboard.html"; }, 2000);
            } else { speak("يرجى إدخال اسم المنطقة."); }
        }
        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang = 'ar-SA'; window.speechSynthesis.speak(u); }
    </script>
</body>
</html>
