<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعداد النسخة السيادية - تهيئة النطاق الميداني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #0d1321; 
            color: #00f2ff; 
            margin: 0; 
            padding-bottom: 100px;
            overflow-x: hidden;
        }
        .cyber-card { 
            background: rgba(13, 19, 33, 0.7); 
            border: 1px solid rgba(0, 242, 255, 0.2); 
            backdrop-filter: blur(20px); 
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .input-field { 
            background: #ffffff; 
            color: #080e1c; 
            padding: 14px; 
            border-radius: 4px; 
            width: 100%; 
            outline: none; 
            font-weight: bold;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: #00f2ff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }
        .num-btn { 
            background: rgba(0, 242, 255, 0.05); 
            border: 1px solid rgba(0, 242, 255, 0.1); 
            transition: 0.2s; 
        }
        .num-btn:active { 
            background: #00f2ff; 
            color: #000; 
            transform: scale(0.95); 
        }
        .glow-text {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-6" onload="initiateSetupProtocol()">
    
    <header class="flex justify-between items-center mb-8 border-b border-cyan-500/20 pb-4">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-cyan-400 animate-pulse">settings_input_antenna</span>
            <div>
                <h1 class="text-xs font-black tracking-widest uppercase">System Initialization</h1>
                <div class="text-[9px] text-cyan-500/60 font-mono">SOVEREIGN_NODE_v7.2.0</div>
            </div>
        </div>
        <div class="text-[9px] font-bold text-cyan-400 border border-cyan-500/30 px-2 py-1 rounded bg-cyan-950/30">
            SECURE SETUP MODE
        </div>
    </header>

    <main class="flex-1 max-w-lg mx-auto w-full space-y-6">
        <div class="cyber-card p-6 rounded-xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-2 opacity-10">
                <span class="material-symbols-outlined text-6xl">public</span>
            </div>
            <h2 class="text-sm font-bold mb-5 flex items-center gap-2 glow-text">
                <span class="material-symbols-outlined text-lg">travel_explore</span>
                قفل النطاق الجغرافي والميداني
            </h2>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] uppercase font-bold opacity-60 mb-2 block tracking-widest">Field Sector Name / اسم القطاع الميداني</label>
                    <input type="text" id="region-input" placeholder="أدخل اسم المنطقة الميدانية..." class="input-field shadow-inner">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] uppercase font-bold opacity-60 mb-2 block">Latitude</label>
                        <input type="text" value="13.9617° N" readonly class="input-field bg-slate-100 text-center font-mono text-xs opacity-80">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold opacity-60 mb-2 block">Longitude</label>
                        <input type="text" value="44.7314° E" readonly class="input-field bg-slate-100 text-center font-mono text-xs opacity-80">
                    </div>
                </div>
            </div>
        </div>

        <div class="cyber-card p-6 rounded-xl">
            <h2 class="text-sm font-bold mb-5 flex items-center gap-2 text-red-400">
                <span class="material-symbols-outlined text-lg">verified_user</span>
                تأكيد هوية الآمر (Security PIN)
            </h2>
            
            <div class="flex justify-center gap-3 mb-6">
                <div class="pin-dot w-10 h-12 border-b-4 border-cyan-500/30 flex items-center justify-center text-2xl font-black" id="dot-0"></div>
                <div class="pin-dot w-10 h-12 border-b-4 border-cyan-500/30 flex items-center justify-center text-2xl font-black" id="dot-1"></div>
                <div class="pin-dot w-10 h-12 border-b-4 border-cyan-500/30 flex items-center justify-center text-2xl font-black" id="dot-2"></div>
                <div class="pin-dot w-10 h-12 border-b-4 border-cyan-500/30 flex items-center justify-center text-2xl font-black" id="dot-3"></div>
            </div>

            <div class="grid grid-cols-3 gap-3 max-w-[240px] mx-auto">
                <button class="num-btn h-14 rounded-lg font-bold text-lg" onclick="pressNum('1')">1</button>
                <button class="num-btn h-14 rounded-lg font-bold text-lg" onclick="pressNum('2')">2</button>
                <button class="num-btn h-14 rounded-lg font-bold text-lg" onclick="pressNum('3')">3</button>
                <button class="num-btn h-14 rounded-lg font-bold text-lg" onclick="pressNum('4')">4</button>
                <button class="num-btn h-14 rounded-lg font-bold text-lg" onclick="pressNum('5')">5</button>
                <button class="num-btn h-14 rounded-lg font-bold text-lg" onclick="pressNum('6')">6</button>
                <button class="num-btn h-14 rounded-lg font-bold text-lg" onclick="pressNum('7')">7</button>
                <button class="num-btn h-14 rounded-lg font-bold text-lg" onclick="pressNum('8')">8</button>
                <button class="num-btn h-14 rounded-lg font-bold text-lg" onclick="pressNum('9')">9</button>
                <button class="num-btn h-14 rounded-lg bg-red-500/10 text-red-500" onclick="clearPin()">
                    <span class="material-symbols-outlined">backspace</span>
                </button>
                <button class="num-btn h-14 rounded-lg font-bold text-lg" onclick="pressNum('0')">0</button>
                <button class="num-btn h-14 rounded-lg bg-cyan-400 text-black font-black" onclick="finalizeSetup()">OK</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-2 bg-slate-950/95 backdrop-blur-3xl border-t border-cyan-500/20">
        <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center justify-center text-cyan-400/40">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[9px] uppercase font-bold mt-1">Dashboard</span>
        </button>
        <div class="flex flex-col items-center justify-center text-black bg-cyan-400 rounded-lg py-2 px-6 shadow-[0_0_20px_#00f2ff]">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] uppercase font-black">SETUP</span>
        </div>
        <button onclick="window.location.href='radar.html'" class="flex flex-col items-center justify-center text-cyan-400/40">
            <span class="material-symbols-outlined">radar</span>
            <span class="text-[9px] uppercase font-bold mt-1">Radar</span>
        </button>
    </nav>

    <script>
        let pin = "";

        function initiateSetupProtocol() {
            const msg = "سيادة العقيد علي العماري، نظام التهيئة جاهز. يرجى إدخال بيانات النطاق الميداني وتأكيد رمز الصلاحية لبدء قفل السيادة الجغرافية.";
            const utterance = new SpeechSynthesisUtterance(msg);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function pressNum(n) {
            if(pin.length < 4) {
                pin += n;
                updatePinDisplay();
            }
        }

        function clearPin() {
            pin = "";
            updatePinDisplay();
        }

        function updatePinDisplay() {
            for(let i=0; i<4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if(pin[i]) {
                    dot.innerText = "●";
                    dot.classList.add('text-cyan-400');
                    dot.style.borderBottomColor = "#00f2ff";
                } else {
                    dot.innerText = "";
                    dot.style.borderBottomColor = "rgba(0, 242, 255, 0.3)";
                }
            }
        }

        function finalizeSetup() {
            const region = document.getElementById('region-input').value;
            if(!region || pin.length < 4) {
                alert("تنبيه: يرجى إكمال جميع بيانات النطاق ورمز الصلاحية.");
                return;
            }

            localStorage.setItem('region', region);
            
            const successMsg = `تم بنجاح قفل النطاق الجغرافي على منطقة ${region}. المنظومة السيادية في حالة الجاهزية الآن.`;
            const utterance = new SpeechSynthesisUtterance(successMsg);
            utterance.lang = 'ar-SA';
            window.speechSynthesis.speak(utterance);

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 2000);
        }
    </script>
</body>
</html>
