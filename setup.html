<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعداد المنظومة السيادية - قفل النطاق الميداني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0d1321; color: #00f2ff; margin: 0; padding-bottom: 80px; }
        .cyber-card { background: rgba(13, 19, 33, 0.8); border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(10px); }
        .input-field { background: #ffffff; color: #080e1c; padding: 12px; border-radius: 4px; width: 100%; outline: none; font-weight: bold; border: 2px solid transparent; transition: 0.3s; }
        .input-field:focus { border-color: #00f2ff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        .num-btn { background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.1); transition: 0.2s; }
        .num-btn:active { background: #00f2ff; color: #000; transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen flex flex-col p-6" onload="playSetupGreeting()">
    
    <header class="flex justify-between items-center mb-8 border-b border-cyan-500/20 pb-4">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-cyan-400">settings_suggest</span>
            <h1 class="text-xs font-black tracking-widest uppercase">System Setup | تهيئة المنظومة</h1>
        </div>
        <div class="text-[9px] font-bold text-cyan-500/50 uppercase">Security Level: High</div>
    </header>

    <main class="flex-1 space-y-6">
        <div class="cyber-card p-5 rounded-lg shadow-xl">
            <h2 class="text-sm font-bold mb-4 flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">location_on</span>
                تحديد النطاق الميداني والجغرافي
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase opacity-60 mb-2 block">اسم المنطقة الميدانية</label>
                    <input type="text" id="region-input" placeholder="أدخل اسم المنطقة (مثلاً: الضالع)" class="input-field">
                </div>
                <div>
                    <label class="text-[10px] uppercase opacity-60 mb-2 block">إحداثيات القفل السيادي</label>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="Latitude" class="input-field text-center font-mono text-xs" readonly value="13.9617° N">
                        <input type="text" placeholder="Longitude" class="input-field text-center font-mono text-xs" readonly value="44.7314° E">
                    </div>
                </div>
            </div>
        </div>

        <div class="cyber-card p-5 rounded-lg shadow-xl">
            <h2 class="text-sm font-bold mb-4 flex items-center gap-2 text-red-400">
                <span class="material-symbols-outlined text-sm">lock</span>
                رمز تأكيد الصلاحية
            </h2>
            <div class="flex justify-center mb-4">
                <div id="pin-display" class="flex gap-2">
                    <div class="w-8 h-8 border-b-2 border-cyan-500/30 flex items-center justify-center font-bold text-xl"></div>
                    <div class="w-8 h-8 border-b-2 border-cyan-500/30 flex items-center justify-center font-bold text-xl"></div>
                    <div class="w-8 h-8 border-b-2 border-cyan-500/30 flex items-center justify-center font-bold text-xl"></div>
                    <div class="w-8 h-8 border-b-2 border-cyan-500/30 flex items-center justify-center font-bold text-xl"></div>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-2 max-w-[200px] mx-auto">
                <button class="num-btn h-12 rounded" onclick="pressPin(1)">1</button>
                <button class="num-btn h-12 rounded" onclick="pressPin(2)">2</button>
                <button class="num-btn h-12 rounded" onclick="pressPin(3)">3</button>
                <button class="num-btn h-12 rounded" onclick="pressPin(4)">4</button>
                <button class="num-btn h-12 rounded" onclick="pressPin(5)">5</button>
                <button class="num-btn h-12 rounded" onclick="pressPin(6)">6</button>
                <button class="num-btn h-12 rounded" onclick="pressPin(7)">7</button>
                <button class="num-btn h-12 rounded" onclick="pressPin(8)">8</button>
                <button class="num-btn h-12 rounded" onclick="pressPin(9)">9</button>
                <button class="num-btn h-12 rounded bg-red-500/10" onclick="clearPin()">C</button>
                <button class="num-btn h-12 rounded" onclick="pressPin(0)">0</button>
                <button class="num-btn h-12 rounded bg-cyan-500/20" onclick="saveConfig()">OK</button>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-2 bg-slate-950/90 backdrop-blur-2xl border-t border-cyan-500/20">
        <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center justify-center text-cyan-400/50">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[10px] uppercase font-bold">DASHBOARD</span>
        </button>
        <button onclick="window.location.href='radar.html'" class="flex flex-col items-center justify-center text-cyan-400/50">
            <span class="material-symbols-outlined">radar</span>
            <span class="text-[10px] uppercase font-bold">RADAR</span>
        </button>
        <div class="flex flex-col items-center justify-center text-black bg-cyan-400 rounded-sm py-1 px-3 shadow-[0_0_12px_#00f2ff]">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] uppercase font-bold">SETUP</span>
        </div>
    </nav>

    <script>
        let currentPin = "";

        function playSetupGreeting() {
            const setupMsg = "سيادة العقيد علي العماري، يرجى إدخال بيانات النطاق الميداني وتحديد المنطقة الجغرافية لبدء تهيئة المنظومة السيادية.";
            const utterance = new SpeechSynthesisUtterance(setupMsg);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }

        function pressPin(num) {
            if(currentPin.length < 4) {
                currentPin += num;
                updatePinUI();
            }
        }

        function clearPin() {
            currentPin = "";
            updatePinUI();
        }

        function updatePinUI() {
            const slots = document.getElementById('pin-display').children;
            for(let i=0; i<4; i++) {
                slots[i].innerText = currentPin[i] ? "●" : "";
            }
        }

        function saveConfig() {
            const region = document.getElementById('region-input').value;
            if(!region || currentPin.length < 4) {
                alert("يرجى إكمال البيانات المطلوبة");
                return;
            }
            
            localStorage.setItem('region', region);
            alert("تم حفظ إعدادات النطاق الميداني بنجاح. المنظومة جاهزة للعمل.");
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
