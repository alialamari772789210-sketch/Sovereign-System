<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS SOVEREIGN | نظام التحقق الجغرافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #020617; color: #00f2ff; overflow: hidden; margin: 0; }
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 80px; }
        .active-page { display: block; }
        
        /* شاشة الدخول وبوابة الوصول */
        #access-gate { display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #0f172a 0%, #020617 100%); z-index: 9999; position: fixed; inset: 0; }
        .display-unit { border: 2px solid rgba(0, 242, 255, 0.3); background: rgba(0, 242, 255, 0.05); text-shadow: 0 0 10px #00f2ff; box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.1); border-radius: 8px; }
        
        /* لوحة المفاتيح الهجينة */
        .key { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(56, 189, 248, 0.2); transition: 0.1s; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 14px; color: #38bdf8; height: 45px; font-weight: bold; }
        .key:active { background: #00f2ff; color: #000; transform: scale(0.95); }
        .key-num { background: rgba(0, 242, 255, 0.1); border-color: #00f2ff; color: #00f2ff; }

        /* شاشة الضبط الجغرافي */
        .cyber-card { background: rgba(13, 19, 33, 0.7); border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(20px); border-radius: 12px; }
        .input-field { background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.3); color: #00f2ff; padding: 12px; border-radius: 8px; width: 100%; outline: none; text-align: center; font-weight: bold; }
        
        .earth-glow { border-radius: 50%; box-shadow: 0 0 40px rgba(0, 242, 255, 0.15); border: 1px solid rgba(0, 242, 255, 0.2); width: 220px; height: 220px; margin: 0 auto; position: relative; }
        .radar-ping { position: absolute; inset: 0; border: 1px solid #00f2ff; border-radius: 50%; animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; opacity: 0.5; }
        @keyframes ping { 75%, 100% { transform: scale(1.5); opacity: 0; } }

        nav { position: fixed; bottom: 0; width: 100%; display: none; justify-content: space-around; background: #020617; border-top: 1px solid #00f2ff33; padding: 15px; backdrop-blur: 10px; }
    </style>
</head>
<body onload="initSystem()">

    <div id="access-gate">
        <div class="text-center mb-6">
            <div class="w-20 h-20 rounded-full border-2 border-cyan-500/50 p-1 mb-3 mx-auto overflow-hidden shadow-[0_0_20px_rgba(0,242,255,0.2)]">
                <img src="https://images.unsplash.com/photo-1590424753858-3b6112a4c6f4?auto=format&fit=crop&q=80&w=200" class="w-full h-full object-cover rounded-full grayscale" alt="Commander">
            </div>
            <h1 class="text-2xl font-black text-cyan-400">العقيد علي العماري</h1>
            <p class="text-[9px] tracking-[3px] opacity-50 uppercase">SOVEREIGN SYSTEM ACCESS</p>
        </div>

        <div id="display" class="w-80 h-14 display-unit mb-6 flex items-center justify-center text-xl tracking-[4px] font-bold">
            ********
        </div>

        <div class="grid grid-cols-5 gap-2 w-full max-w-sm px-4">
            <div class="key key-num" onclick="k('1')">1</div><div class="key key-num" onclick="k('2')">2</div><div class="key key-num" onclick="k('3')">3</div><div class="key key-num" onclick="k('4')">4</div><div class="key key-num" onclick="k('5')">5</div>
            <div class="key" onclick="k('A')">A</div><div class="key" onclick="k('L')">L</div><div class="key" onclick="k('I')">I</div><div class="key" onclick="k('C')">C</div><div class="key" onclick="k('E')">E</div>
            <div class="key" onclick="k('B')">B</div><div class="key" onclick="k('D')">D</div><div class="key" onclick="k('G')">G</div><div class="key" onclick="k('S')">S</div><div class="key" onclick="k('X')">X</div>
            <div class="key col-span-5 bg-red-900/20 text-red-500" onclick="reset()">مسح الكود ⌫</div>
        </div>

        <button onclick="auth()" class="mt-8 w-80 py-4 border-2 border-cyan-500 font-black text-cyan-400 hover:bg-cyan-500 hover:text-black transition-all duration-300">دخول / ENTER</button>
    </div>

    <div id="page-setup" class="page p-6">
        <header class="flex justify-between items-center mb-6 border-b border-cyan-900/50 pb-4">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-cyan-400">language</span>
                <h2 class="text-sm font-bold uppercase tracking-widest">تحديد النطاق الجغرافي</h2>
            </div>
            <div class="text-[10px] text-green-400 font-bold animate-pulse">UPLINK: ACTIVE</div>
        </header>

        <div class="earth-glow mb-8 flex items-center justify-center overflow-hidden">
            <div class="radar-ping"></div>
            <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=300" class="w-full h-full object-cover rounded-full opacity-40">
            <div class="absolute text-center">
                <span class="material-symbols-outlined text-4xl animate-bounce">location_on</span>
            </div>
        </div>

        <div class="cyber-card p-5 mb-6">
            <label class="text-[10px] opacity-60 uppercase mb-2 block">اسم المنطقة الميدانية</label>
            <input type="text" placeholder="أدخل اسم المنطقة (مثلاً: قعطبة)" class="input-field mb-4">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] opacity-60 uppercase mb-2 block">إحداثيات الشمال (N)</label>
                    <input type="text" value="13.9617° N" class="input-field text-xs">
                </div>
                <div>
                    <label class="text-[10px] opacity-60 uppercase mb-2 block">إحداثيات الشرق (E)</label>
                    <input type="text" value="44.7314° E" class="input-field text-xs">
                </div>
            </div>
        </div>

        <button class="w-full py-4 bg-cyan-500 text-black font-black rounded-lg shadow-[0_0_20px_rgba(0,242,255,0.4)] uppercase">حفظ وتفعيل السياج الجغرافي</button>
    </div>

    <div id="page-radar" class="page p-6 text-center">
        <h1 class="text-xl font-bold mt-20">شاشة الرادار نشطة</h1>
        <p class="opacity-50 mt-4">نطاق المسح: 300 كم</p>
    </div>

    <nav id="nav-bar">
        <div onclick="show('setup')" id="nav-setup" class="flex flex-col items-center text-cyan-400">
            <span class="material-symbols-outlined">settings_suggest</span>
            <span class="text-[8px] uppercase mt-1">Setup</span>
        </div>
        <div onclick="show('radar')" id="nav-radar" class="flex flex-col items-center opacity-40">
            <span class="material-symbols-outlined">radar</span>
            <span class="text-[8px] uppercase mt-1">Radar</span>
        </div>
    </nav>

    <script>
        let code = "";
        const MASTER = "Alic2A2026"; // الكود المطلوب للدخول

        function k(v) { 
            if(code.length < 10) {
                code += v; 
                document.getElementById('display').innerText = "*".repeat(code.length);
            }
        }

        function reset() { 
            code = ""; 
            document.getElementById('display').innerText = "********"; 
        }

        function auth() {
            if(code === MASTER) {
                // نداء صوتي عند النجاح
                speak("تم التحقق من الصلاحية. سيادة العقيد علي العماري، جاري تحميل بروتوكول التحقق الجغرافي.");
                
                document.getElementById('access-gate').style.display = 'none';
                document.getElementById('nav-bar').style.display = 'flex';
                show('setup');
            } else {
                speak("رمز الوصول غير صحيح، حاول مرة أخرى.");
                reset();
            }
        }

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('nav div').forEach(n => n.style.opacity = '0.4');
            
            document.getElementById('page-' + id).classList.add('active-page');
            document.getElementById('nav-' + id).style.opacity = '1';
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'ar-SA';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function initSystem() { reset(); }
    </script>
</body>
</html>
