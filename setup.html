<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Tactical | نظام التفعيل</title>
    <style>
        :root {
            --gold: #d4af37;
            --bg: #050a0f;
            --panel: rgba(13, 22, 33, 0.95);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        /* شاشة الترحيب الصوتية والكتابية */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        .typing-text {
            border-left: 2px solid var(--gold);
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            font-size: 1.5rem;
            color: var(--gold);
            animation: typing 3.5s steps(40, end) forwards;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        /* الشاشة الرئيسية بعد الترحيب */
        #main-dashboard {
            display: none; /* مخفية في البداية */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .content-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* شريط الأزرار السفلي (Bottom Navigation) */
        .bottom-nav {
            background: var(--panel);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        .nav-btn {
            background: none;
            border: 1px solid transparent;
            color: white;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            flex: 1;
        }

        .nav-btn:hover {
            color: var(--gold);
            border-bottom: 2px solid var(--gold);
        }

        .nav-btn i {
            display: block;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .nav-label { font-size: 0.85rem; font-weight: bold; }

        /* صندوق الإعدادات */
        .settings-card {
            background: var(--panel);
            border: 1px solid var(--gold);
            padding: 25px;
            border-radius: 10px;
            max-width: 500px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="typing-text" id="welcome-msg">جاري تحميل منظومة Aegis Tactical... تم تفعيل بروتوكول السيادة.</div>
    <button onclick="startSystem()" id="start-trigger" style="margin-top: 20px; background: var(--gold); border: none; padding: 10px 20px; cursor: pointer;">دخول النظام</button>
</div>

<div id="main-dashboard" style="display: none;">
    <div class="content-area" id="main-display">
        <div class="settings-card">
            <h2 style="color: var(--gold);">مرحباً أيها القائد</h2>
            <p>اختر من القائمة السفلية لبدء العمليات الميدانية.</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn" onclick="loadContent('home')">
            <span class="nav-label">1. الصفحة الرسمية</span>
        </button>
        <button class="nav-btn" onclick="loadContent('radar')">
            <span class="nav-label">2. الدخول للرادار</span>
        </button>
        <button class="nav-btn" onclick="loadContent('geo')">
            <span class="nav-label">3. النطاق الجغرافي</span>
        </button>
        <button class="nav-btn" onclick="loadContent('settings')">
            <span class="nav-label">4. الإعدادات والتعريف</span>
        </button>
    </nav>
</div>

<script>
    // وظيفة الترحيب الصوتي
    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'ar-SA';
        msg.rate = 0.9; // سرعة هادئة ورسمية
        window.speechSynthesis.speak(msg);
    }

    function startSystem() {
        // تشغيل الصوت
        speak("تم تشغيل نظام إيجيس تكتيكال. بانتظار الأوامر.");
        
        // إخفاء شاشة الترحيب وإظهار الرئيسية
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'flex';
        }, 1000);
    }

    // وظيفة التنقل بين الأزرار الأربعة
    function loadContent(type) {
        const display = document.getElementById('main-display');
        let html = '';

        switch(type) {
            case 'home':
                html = `<div><h2>الصفحة الرسمية</h2><p>بيانات الحالة العامة للمنظومة والوحدات.</p></div>`;
                break;
            case 'radar':
                html = `<div><h2 style="color:red;">الرادار التكتيكي</h2><p>جاري البحث عن الأهداف في المدى الميداني...</p></div>`;
                break;
            case 'geo':
                html = `<div><h2>تحديد النطاق الجغرافي</h2><input type="text" placeholder="أدخل الإحداثيات"></div>`;
                break;
            case 'settings':
                html = `
                    <div class="settings-card">
                        <h3 style="color: var(--gold);">التعريف بالمنظومة والمهندس</h3>
                        <p><strong>المهندس:</strong> العقيد مهندس علي العمري</p>
                        <p><strong>النظام:</strong> Aegis Tactical V7.2.0</p>
                        <hr border-color="var(--gold)">
                        <p style="font-size:0.8rem;">نظام سيادي متكامل للإدارة الميدانية والتحليل الراداري.</p>
                    </div>`;
                break;
        }
        display.innerHTML = html;
    }
</script>

</body>
</html>
