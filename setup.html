<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعداد النسخة السيادية - النسخة النهائية الموحدة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0d1321; color: #00f2ff; margin: 0; padding-bottom: 100px; }
        .cyber-card { background: rgba(13, 19, 33, 0.7); border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(20px); }
        .btn-deploy { background: #00f2ff; color: #080e1c; font-weight: 900; width: 100%; padding: 20px; border-radius: 4px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.1em; }
        .btn-deploy:active { transform: scale(0.98); filter: brightness(1.2); }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <header class="flex justify-between items-center px-6 h-16 border-b border-cyan-500/20 bg-[#0d1321]/90 backdrop-blur-xl z-50 sticky top-0">
        <div class="flex items-center gap-2 text-cyan-400">
            <span class="material-symbols-outlined">security</span>
            <h1 class="text-sm font-bold tracking-widest uppercase">SOVEREIGN COMMAND | قيادة</h1>
        </div>
        <span class="material-symbols-outlined text-cyan-400">mic</span>
    </header>

    <main class="flex-1 p-6 flex flex-col gap-8">
        <div class="text-center py-4 border-b border-cyan-500/10 pb-8">
            <div class="text-[10px] font-bold text-cyan-400 uppercase tracking-[0.3em] mb-2">INITIALIZATION SEQUENCE</div>
            <h2 class="text-4xl font-black text-cyan-400 mb-2 leading-tight uppercase">SOVEREIGN SYSTEM SETUP</h2>
            <p class="text-xl opacity-80">إعداد نسخة المنظومة</p>
        </div>

        <div class="flex flex-col gap-8">
            <div class="relative">
                <label class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest block mb-4">رمز الوصول السري / SECRET ACCESS CODE</label>
                <div class="cyber-card p-6 rounded border-l-4 border-cyan-400 flex items-center gap-4">
                    <span class="material-symbols-outlined text-cyan-400">vpn_key</span>
                    <input type="password" placeholder="••••••••••" class="bg-transparent border-none outline-none flex-1 text-2xl tracking-[0.8em] font-bold text-cyan-400" id="accessCode">
                </div>
            </div>

            <div class="relative">
                <label class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest block mb-4">اسم المنطقة العملياتية / OPERATIONAL REGION NAME</label>
                <div class="cyber-card p-6 rounded border-l-4 border-cyan-400 flex items-center gap-4">
                    <span class="material-symbols-outlined text-cyan-400">location_on</span>
                    <input type="text" placeholder="الضالع - مديرية قعطبة" class="bg-transparent border-none outline-none flex-1 text-xl font-bold text-white" id="regionName">
                </div>
            </div>

            <div class="relative">
                <div class="flex justify-between items-center mb-6">
                    <label class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest">نطاق المسافة / PERMISSIBLE DISTANCE RADIUS</label>
                    <div class="text-right"><div class="text-3xl font-black italic text-cyan-400">250</div><div class="text-[10px] font-bold opacity-60">KM</div></div>
                </div>
                <div class="h-1.5 bg-slate-800 rounded-full relative mb-8">
                    <div class="absolute h-full w-1/2 bg-cyan-400 shadow-[0_0_15px_#00f2ff]"></div>
                    <div class="absolute w-4 h-4 bg-cyan-400 rounded-full -top-1.5 left-1/2 shadow-[0_0_20px_#00f2ff]"></div>
                </div>
            </div>

            <button class="btn-deploy flex items-center justify-center gap-4 group mt-4 rounded shadow-[0_0_20px_rgba(0,242,255,0.4)]" onclick="deploySystem()">
                <span class="text-xl">نشر المنظومة / DEPLOY SYSTEM</span>
                <span class="material-symbols-outlined group-hover:animate-bounce">rocket_launch</span>
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-2 bg-slate-950/90 backdrop-blur-2xl border-t border-cyan-500/20">
        <div class="flex flex-col items-center justify-center text-black bg-cyan-400 rounded-sm py-1 px-3 shadow-[0_0_12px_#00f2ff]">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] uppercase font-bold">SETUP</span>
        </div>
    </nav>

    <script>
        function deploySystem() {
            const code = document.getElementById('accessCode').value;
            const region = document.getElementById('regionName').value;
            if(code === "Alic2A2026" && region !== "") {
                localStorage.setItem('region', region);
                window.location.href = "index.html";
            } else {
                alert("بيانات الوصول غير صحيحة.");
            }
        }
    </script>
</body>
</html>
