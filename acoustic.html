<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرصد الحراري الصوتي - العقيد علي العماري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { background-color: #020817; color: #00f2ff; font-family: sans-serif; overflow-x: hidden; }
        .thermal-bg { background: radial-gradient(circle, rgba(255, 68, 68, 0.1) 0%, transparent 70%); }
        .compass-ring { width: 200px; height: 200px; border: 2px solid rgba(0, 242, 255, 0.2); border-radius: 50%; position: relative; margin: 20px auto; }
        .direction-indicator { position: absolute; width: 4px; height: 40px; background: #ff4444; left: 50%; top: 10px; transform-origin: bottom center; transition: all 1s ease; border-radius: 2px; box-shadow: 0 0 15px #ff4444; }
        .node-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body class="p-4 thermal-bg min-h-screen">

    <header class="flex justify-between items-center mb-6">
        <div>
            <p class="text-[10px] text-red-500 font-bold uppercase tracking-widest">Acoustic Thermal Map</p>
            <h1 class="text-lg font-black text-white">الرصد التوجيهي V7.8</h1>
        </div>
        <div class="text-right">
            <span class="material-symbols-outlined text-red-500 animate-pulse">distance</span>
        </div>
    </header>

    <div class="compass-ring flex items-center justify-center">
        <div id="arrow" class="direction-indicator" style="transform: translateX(-50%) rotate(0deg);"></div>
        <div class="absolute text-[10px] top-2 font-bold">N</div>
        <div class="absolute text-[10px] bottom-2 font-bold">S</div>
        <div class="absolute text-[10px] left-2 font-bold">W</div>
        <div class="absolute text-[10px] right-2 font-bold">E</div>
        <div class="w-2 h-2 bg-white rounded-full"></div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="bg-slate-900/80 p-3 rounded-lg border border-white/5">
            <p class="text-[8px] opacity-50 uppercase">الاتجاه التقريبي</p>
            <p id="dir-text" class="text-sm font-bold text-white">شمال - غرب</p>
        </div>
        <div class="bg-slate-900/80 p-3 rounded-lg border border-white/5">
            <p class="text-[8px] opacity-50 uppercase">المستوى الحراري للصوت</p>
            <p id="temp-text" class="text-sm font-bold text-red-500">42° High Risk</p>
        </div>
    </div>

    <div class="bg-black/60 rounded-xl p-5 border border-red-500/20 mb-6">
        <div class="flex items-center gap-3 mb-4">
            <div class="relative w-4 h-4"><div class="absolute inset-0 bg-red-500 rounded-full node-pulse"></div><div class="relative bg-red-500 w-4 h-4 rounded-full"></div></div>
            <h3 class="text-xs font-bold text-red-500 uppercase">Alert: Signal Intercepted</h3>
        </div>
        <p id="intel-brief" class="text-[11px] text-white/80 leading-relaxed mb-4">
            جاري معالجة الموجات الصوتية المنبعثة.. تم رصد تردد منخفض يوحي بمحرك احتراق داخلي.
        </p>
        <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
            <div id="progress" class="bg-red-500 h-full w-0 transition-all duration-[3000ms]"></div>
        </div>
    </div>

    <button onclick="runThermalScan()" class="w-full py-5 bg-red-600 text-white font-black text-xs uppercase tracking-[0.2em] rounded-xl shadow-[0_0_25px_rgba(255,68,68,0.4)] active:scale-95 transition-all">
        تفعيل المسح الحراري الموجه
    </button>

    <script>
        const directions = [
            { deg: 45, text: "شمال شرق", city: "قطاع دمت" },
            { deg: 315, text: "شمال غرب", city: "قطاع الحشاء" },
            { deg: 180, text: "جنوب صريح", city: "مركز الضالع" },
            { deg: 0, text: "شمال صريح", city: "العود" }
        ];

        function runThermalScan() {
            const btn = document.querySelector('button');
            btn.innerText = "جاري التوجيه...";
            document.getElementById('progress').style.width = '100%';
            
            // محاكاة تحرك البوصلة
            setTimeout(() => {
                const target = directions[Math.floor(Math.random() * directions.length)];
                document.getElementById('arrow').style.transform = `translateX(-50%) rotate(${target.deg}deg)`;
                document.getElementById('dir-text').innerText = target.text;
                document.getElementById('intel-brief').innerText = `تم تحديد اتجاه المصدر الصوتي في ${target.city}. الهدف في حالة اقتراب.`;
                
                speak(`سيادة العقيد، الهدف يتحرك الآن في اتجاه ${target.text} باتجاه ${target.city}.`);
                btn.innerText = "تفعيل المسح الحراري الموجه";
                document.getElementById('progress').style.width = '0%';
            }, 3000);
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
