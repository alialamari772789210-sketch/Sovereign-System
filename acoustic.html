<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاستشعار الميداني الحي - V8.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #01060f; color: #00f2ff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .bar { fill: #00f2ff; transition: height 0.05s ease; }
        .grid-bg { background-image: linear-gradient(rgba(0,242,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,242,255,0.05) 1px, transparent 1px); background-size: 30px 30px; }
        .compass-container { transform-style: preserve-3d; transition: transform 0.2s; }
    </style>
</head>
<body class="grid-bg min-h-screen p-4">

    <header class="border-b border-cyan-500/30 pb-2 mb-6">
        <h1 class="text-xs font-bold tracking-[0.3em]">LIVE SENSOR INTEGRATION</h1>
        <p class="text-[10px] opacity-60">وحدة الربط الفيزيائي - العقيد علي العماري</p>
    </header>

    <div class="bg-black/80 rounded-lg border border-cyan-500/20 p-4 mb-6">
        <div class="flex justify-between items-center mb-4">
            <span class="text-[10px] font-bold">REAL-TIME SPECTRUM</span>
            <span id="db-level" class="text-xs text-yellow-500">00 dB</span>
        </div>
        <canvas id="visualizer" class="w-full h-32"></canvas>
    </div>

    <div class="flex flex-col items-center justify-center mb-8">
        <div id="compass" class="w-40 h-40 border-2 border-cyan-500/20 rounded-full relative flex items-center justify-center compass-container">
            <div class="absolute top-1 font-bold text-xs text-red-500">N</div>
            <div class="w-1 h-20 bg-gradient-to-t from-transparent via-cyan-400 to-red-500 absolute bottom-1/2 origin-bottom rounded-full" id="needle"></div>
            <div class="text-[8px] mt-24" id="heading">000°</div>
        </div>
        <p class="text-[9px] mt-4 opacity-50 uppercase tracking-widest">توجيه الهاتف يغير إحداثيات الرصد</p>
    </div>

    <div id="intel-box" class="p-4 bg-cyan-900/10 border-l-4 border-cyan-500 rounded text-[11px] leading-relaxed mb-6">
        في انتظار تفعيل الحساسات الميدانية.. يرجى الضغط على الزر أدناه لبدء الربط الفيزيائي.
    </div>

    <button onclick="initSensors()" id="startBtn" class="w-full py-4 bg-cyan-500 text-black font-black text-xs uppercase rounded-sm shadow-[0_0_15px_#00f2ff] active:scale-95 transition-all">
        بدء الربط الفيزيائي (Sensors ON)
    </button>

    <script>
        let audioCtx, analyser, dataArray, canvas, canvasCtx;

        function initSensors() {
            // 1. تفعيل الميكروفون
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    const source = audioCtx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    analyser.fftSize = 64;
                    const bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);
                    
                    canvas = document.getElementById('visualizer');
                    canvasCtx = canvas.getContext('2d');
                    draw();
                    
                    document.getElementById('startBtn').innerText = "SYSTEM ACTIVE";
                    document.getElementById('intel-box').innerText = "تم الربط بالميكروفون والحساسات. المنظومة الآن تستمع للترددات المحيطة.";
                    speak("تم تفعيل الربط الفيزيائي بنجاح يافندم.");
                }).catch(err => alert("يرجى السماح بالوصول للميكروفون"));
            }

            // 2. تفعيل البوصلة (لأجهزة الأندرويد والآيفون)
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientationabsolute', (event) => {
                    let heading = event.alpha || event.webkitCompassHeading;
                    if(heading) {
                        document.getElementById('needle').style.transform = `rotate(${-heading}deg)`;
                        document.getElementById('heading').innerText = Math.round(heading) + "°";
                    }
                }, true);
            }
        }

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);
            
            canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
            const barWidth = (canvas.width / dataArray.length) * 2.5;
            let x = 0;

            for(let i = 0; i < dataArray.length; i++) {
                let barHeight = dataArray[i] / 2;
                canvasCtx.fillStyle = `rgb(0, ${barHeight + 100}, 255)`;
                canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 2;
                
                // تحديث مستوى الديسيبل
                if(i === 10) document.getElementById('db-level').innerText = dataArray[i] + " dB";
            }
        }

        function speak(t) {
            const s = new SpeechSynthesisUtterance(t);
            s.lang = 'ar-SA';
            window.speechSynthesis.speak(s);
        }
    </script>
</body>
</html>
