<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #020617; color: #00f2ff; font-family: 'Courier New', monospace; overflow: hidden; }
        .page { display: none; height: 100vh; padding-bottom: 80px; overflow-y: auto; }
        .active-page { display: block; }
        
        /* شاشة الحماية */
        #page-lock { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617; z-index: 9999; position: fixed; inset: 0; }
        .lock-input { background: transparent; border: 1px solid #00f2ff; color: #00f2ff; text-align: center; font-size: 2rem; width: 160px; padding: 10px; outline: none; }
        
        /* تصميم الرادار */
        .radar-box { position: relative; width: 260px; height: 260px; border: 2px solid #00f2ff; border-radius: 50%; margin: 10px auto; background: radial-gradient(circle, #0a2d2d 0%, #020617 85%); }
        .sweeper { position: absolute; top: 50%; left: 50%; width: 50%; height: 2px; background: linear-gradient(to right, transparent, #00f2ff); transform-origin: left; animation: sweep 4s linear infinite; display: none; }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .scanning .sweeper { display: block; }
        #map { width: 100%; height: 220px; filter: invert(100%) hue-rotate(180deg) brightness(0.6); margin-top: 10px; border-top: 1px solid #00f2ff; }

        /* زر التشغيل العلوي المطور */
        .radar-toggle-container { background: rgba(0, 242, 255, 0.05); padding: 8px 15px; border-radius: 10px; border: 1px solid rgba(0, 242, 255, 0.2); }
        .nav-btn { cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-btn.active { opacity: 1; color: #00f2ff; border-top: 2px solid #00f2ff; }
    </style>
</head>
<body onload="checkLock()">

    <div id="page-lock">
        <h1 class="text-red-500 font-bold mb-4 tracking-widest text-sm">SECURE ACCESS REQUIRED</h1>
        <input type="password" id="passcode" class="lock-input" placeholder="****" maxlength="4" oninput="verify(this)">
    </div>

    <div id="page-dashboard" class="page p-4">
        <header class="flex justify-between items-center mb-6 border-b border-cyan-900 pb-2">
            <div>
                <h1 class="text-xs font-black uppercase">STRATEGIC COMMAND</h1>
                <p class="text-[9px] text-cyan-500 uppercase">COLONEL: ALI AL-OMARI</p>
            </div>
        </header>
        <div class="bg-cyan-950/20 border border-cyan-500/30 p-4 rounded-xl">
            <p class="text-[10px] opacity-50">OPERATIONAL SECTOR</p>
            <h2 class="text-lg font-bold">قعطبة - الضالع</h2>
        </div>
    </div>

    <div id="page-radar" class="page p-4 text-center">
        <div class="flex justify-between items-center mb-4 radar-toggle-container">
            <span class="text-red-500 text-[10px] font-bold">▲ NORTH ▲</span>
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-bold">RADAR POWER:</span>
                <input type="checkbox" id="radarMaster" onchange="toggleRadar()" class="w-5 h-5 accent-cyan-500 cursor-pointer">
            </div>
        </div>
        
        <div id="radar" class="radar-box"><div class="sweeper"></div></div>
        <div id="map"></div>
    </div>

    <nav id="main-nav" class="fixed bottom-0 w-full bg-slate-950 border-t border-cyan-500/20 hidden justify-around p-4 z-50">
        <div onclick="showPage('dashboard')" id="btn-dashboard" class="nav-btn active flex flex-col items-center">
            <span class="text-[10px] font-bold">MAIN</span>
        </div>
        <div onclick="showPage('radar')" id="btn-radar" class="nav-btn flex flex-col items-center">
            <span class="text-[10px] font-bold">RADAR</span>
        </div>
    </nav>

    <script>
        const CODE = "1234";
        let map;

        function verify(i) {
            if(i.value === CODE) {
                document.getElementById('page-lock').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                showPage('dashboard');
                speak("تم الدخول بنجاح.");
            }
        }

        function showPage(pId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + pId).classList.add('active-page');
            document.getElementById('btn-' + pId).classList.add('active');
            if(pId === 'radar' && !map) initMap();
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([13.84, 44.73], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function toggleRadar() {
            const active = document.getElementById('radarMaster').checked;
            const r = document.getElementById('radar');
            if(active) {
                r.classList.add('scanning');
                speak("الرادار يعمل الآن.");
            } else {
                r.classList.remove('scanning');
                speak("إغلاق الرادار.");
            }
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'ar-SA';
            window.speechSynthesis.speak(u);
        }

        function checkLock() {
            document.getElementById('page-lock').style.display = 'flex';
        }
    </script>
</body>
</html>
