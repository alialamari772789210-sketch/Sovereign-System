<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدخول السيادية - التحقق العسكري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050a14; color: #00f2ff; margin: 0; overflow-x: hidden; }
        .cyber-input-shield { background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2); position: relative; }
        .key-btn { background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.1); transition: 0.15s; font-size: 0.85rem; }
        .key-btn:active { background: #00f2ff; color: #000; transform: scale(0.9); }
        .scan-line { height: 2px; background: rgba(0, 242, 255, 0.4); position: absolute; width: 100%; top: 0; animation: scan 4s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .profile-glow { box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); border: 2px solid #00f2ff; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-6" onload="playMilitaryGreeting()">
    
    <header class="w-full flex justify-between items-center mb-8 border-b border-cyan-500/20 pb-4">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-cyan-400">military_tech</span>
            <h1 class="text-[10px] font-black tracking-[0.3em] uppercase">Sovereign Gate | نظام التحقق</h1>
        </div>
        <div class="text-[9px] font-mono text-cyan-500/70 animate-pulse">CRYPTOGRAPHIC LINK: ACTIVE</div>
    </header>

    <div class="w-full max-w-sm flex flex-col items-center">
        <div class="relative mb-8">
            <div class="w-32 h-32 rounded-full overflow-hidden profile-glow">
                <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&q=80&w=400" 
                     class="w-full h-full object-cover grayscale brightness-90">
            </div>
            <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-cyan-400 text-black text-[10px] font-black px-3 py-1 rounded shadow-lg whitespace-nowrap">
                العقيد علي العماري
            </div>
        </div>

        <div class="w-full mb-8 relative">
            <div class="cyber-input-shield h-16 rounded-lg flex items-center justify-center overflow-hidden">
                <div class="scan-line"></div>
                <div id="display-text" class="text-3xl tracking-[0.5em] font-black drop-shadow-[0_0_8px_#00f2ff]"></div>
            </div>
            <div class="text-[8px] text-center mt-2 opacity-40 uppercase tracking-widest">Awaiting Command Authentication</div>
        </div>

        <div class="w-full space-y-2">
            <div class="grid grid-cols-10 gap-1">
                <button class="key-btn h-11 rounded" onclick="tap('Q')">Q</button>
                <button class="key-btn h-11 rounded" onclick="tap('W')">W</button>
                <button class="key-btn h-11 rounded" onclick="tap('E')">E</button>
                <button class="key-btn h-11 rounded" onclick="tap('R')">R</button>
                <button class="key-btn h-11 rounded" onclick="tap('T')">T</button>
                <button class="key-btn h-11 rounded" onclick="tap('Y')">Y</button>
                <button class="key-btn h-11 rounded" onclick="tap('U')">U</button>
                <button class="key-btn h-11 rounded" onclick="tap('I')">I</button>
                <button class="key-btn h-11 rounded" onclick="tap('O')">O</button>
                <button class="key-btn h-11 rounded" onclick="tap('P')">P</button>
            </div>
            <div class="grid grid-cols-9 gap-1 px-2">
                <button class="key-btn h-11 rounded" onclick="tap('A')">A</button>
                <button class="key-btn h-11 rounded" onclick="tap('S')">S</button>
                <button class="key-btn h-11 rounded" onclick="tap('D')">D</button>
                <button class="key-btn h-11 rounded" onclick="tap('F')">F</button>
                <button class="key-btn h-11 rounded" onclick="tap('G')">G</button>
                <button class="key-btn h-11 rounded" onclick="tap('H')">H</button>
                <button class="key-btn h-11 rounded" onclick="tap('J')">J</button>
                <button class="key-btn h-11 rounded" onclick="tap('K')">K</button>
                <button class="key-btn h-11 rounded" onclick="tap('L')">L</button>
            </div>
            <div class="grid grid-cols-10 gap-1">
                <button class="key-btn h-11 rounded" onclick="tap('Z')">Z</button>
                <button class="key-btn h-11 rounded" onclick="tap('X')">X</button>
                <button class="key-btn h-11 rounded" onclick="tap('C')">C</button>
                <button class="key-btn h-11 rounded" onclick="tap('V')">V</button>
                <button class="key-btn h-11 rounded" onclick="tap('B')">B</button>
                <button class="key-btn h-11 rounded" onclick="tap('N')">N</button>
                <button class="key-btn h-11 rounded" onclick="tap('M')">M</button>
                <button class="key-btn h-11 rounded" onclick="tap('2')">2</button>
                <button class="key-btn h-11 rounded" onclick="tap('0')">0</button>
                <button class="key-btn h-11 rounded" onclick="tap('2')">2</button>
            </div>
            <div class="grid grid-cols-6 gap-1">
                <button class="key-btn h-11 rounded" onclick="tap('6')">6</button>
                <button class="key-btn h-11 rounded" onclick="tap('A')">A</button>
                <button class="key-btn h-11 rounded" onclick="tap('L')">L</button>
                <button class="key-btn h-11 rounded" onclick="tap('I')">I</button>
                <button class="key-btn h-11 rounded col-span-2 bg-red-600/20 text-red-500 font-bold" onclick="reset()">CLR</button>
            </div>

            <button class="w-full h-16 bg-cyan-400 text-black font-black uppercase tracking-widest rounded-lg shadow-[0_0_25px_rgba(0,242,255,0.4)] mt-6 hover:brightness-110 active:scale-95 transition-all" onclick="executeAuth()">
                Grant Sovereign Access
            </button>
        </div>
    </div>

    <script>
        let code = "";
        const MASTER_KEY = "ALIC2A2026";

        function playMilitaryGreeting() {
            const msg = "العقيد علي العماري، نظام التحقق بانتظار الكود السيادي. يرجى التأكيد للهوية.";
            const speak = new SpeechSynthesisUtterance(msg);
            speak.lang = 'ar-SA';
            speak.rate = 0.85;
            window.speechSynthesis.speak(speak);
        }

        function tap(char) {
            if(code.length < 10) {
                code += char;
                render();
            }
        }

        function reset() {
            code = "";
            render();
        }

        function render() {
            document.getElementById('display-text').innerText = "*".repeat(code.length);
        }

        function executeAuth() {
            if(code.toUpperCase() === MASTER_KEY) {
                const successMsg = "تم تأكيد الهوية. مرحباً بك سيادة العقيد.";
                const speak = new SpeechSynthesisUtterance(successMsg);
                speak.lang = 'ar-SA';
                window.speechSynthesis.speak(speak);
                
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);
            } else {
                alert("ACCESS DENIED: INVALID SOVEREIGN KEY");
                reset();
            }
        }
    </script>
</body>
</html>
