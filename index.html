<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN SYSTEM | العقيد علي العماري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #020617; color: #00f2ff; font-family: 'Courier New', monospace; overflow: hidden; }
        .page { display: none; height: 100vh; overflow-y: auto; }
        .active-page { display: block; }
        
        /* شاشة الدخول الاحترافية */
        #access-gate { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0b1120; z-index: 9999; position: fixed; inset: 0; }
        .key-pad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .key { width: 60px; height: 60px; border: 1px solid #1e293b; background: #1e293b; color: #38bdf8; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .key:active { background: #00f2ff; color: #000; }
        
        /* الرادار */
        .radar-box { position: relative; width: 280px; height: 280px; border: 2px solid #00f2ff; border-radius: 50%; margin: 10px auto; background: radial-gradient(circle, #0a2d2d 0%, #020617 85%); }
        .sweeper { position: absolute; top: 50%; left: 50%; width: 50%; height: 2px; background: linear-gradient(to right, transparent, #00f2ff); transform-origin: left; animation: sweep 4s linear infinite; display: none; }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .scanning .sweeper { display: block; }
        #map { width: 100%; height: 220px; filter: invert(100%) hue-rotate(180deg) brightness(0.6); margin-top: 10px; border-top: 1px solid #00f2ff; }
        
        .nav-btn { cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-btn.active { opacity: 1; color: #00f2ff; border-top: 2px solid #00f2ff; }
    </style>
</head>
<body onload="lockSystem()">

    <div id="access-gate">
        <h1 class="text-3xl font-bold text-cyan-400 mb-2">العقيد علي العماري</h1>
        <p class="text-xs tracking-widest text-slate-500 mb-6 uppercase">SOVEREIGN SYSTEM ACCESS GATE</p>
        
        <div class="w-72 h-14 border-2 border-cyan-500/50 flex items-center justify-center text-2xl tracking-[10px]" id="display">********</div>
        
        <div class="key-pad">
            <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div><div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div>
            <div class="key" onclick="press('6')">6</div><div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div><div class="key" onclick="press('0')">0</div>
        </div>
        
        <button onclick="login()" class="mt-8 w-72 py-4 border border-yellow-500 text-yellow-500 font-bold hover:bg-yellow-500/10 uppercase">ENTER / دخول</button>
    </div>

    <div id="page-dashboard" class="page p-4">
        <header class="flex justify-between items-center mb-6 border-b border-cyan-900 pb-2">
            <h1 class="text-xs font-black">STRATEGIC DASHBOARD</h1>
            <span class="text-[10px] text-green-400">SAT_LINK: CONNECTED</span>
        </header>
        <div class="bg-cyan-950/20 border border-cyan-500/30 p-6 rounded-2xl">
            <p class="text-[10px] text-cyan-500">CURRENT SECTOR</p>
            <h2 class="text-2xl font-bold">القطاع المركزي</h2>
            <div class="w-full bg-cyan-900 h-1 mt-4"><div class="bg-cyan-400 h-full w-[80%]"></div></div>
        </div>
    </div>

    <div id="page-radar" class="page p-4 text-center">
        <div class="flex justify-between items-center mb-4 bg-black/40 p-2 rounded-lg border border-cyan-500/20">
            <span class="text-red-500 text-[10px] font-bold animate-pulse">▲ NORTH / الشمال ▲</span>
            <div class="flex items-center gap-3">
                <span class="text-[10px] font-bold">RADAR PWR:</span>
                <input type="checkbox" id="radarSwitch" onchange="toggleRadar()" class="w-5 h-5 accent-cyan-500">
            </div>
        </div>
        <div id="radar" class="radar-box"><div class="sweeper"></div></div>
        <div id="map"></div>
    </div>

    <nav id="navbar" class="fixed bottom-0 w-full bg-slate-950/95 border-t border-cyan-500/20 hidden justify-around p-4 z-50">
        <div onclick="showPage('dashboard')" id="btn-dashboard" class="nav-btn active flex flex-col items-center">
            <span class="text-[10px] font-bold">DASHBOARD</span>
        </div>
        <div onclick="showPage('radar')" id="btn-radar" class="nav-btn flex flex-col items-center">
            <span class="text-[10px] font-bold">RADAR</span>
        </div>
    </nav>

    <script>
        let inputCode = "";
        const CORRECT_CODE = "12345678"; // يمكنك تعديله
        let map;

        function press(num) { inputCode += num; }
        
        function login() {
            if(inputCode === CORRECT_CODE) {
                document.getElementById('access-gate').style.display = 'none';
                document.getElementById('navbar').style.display = 'flex';
                showPage('dashboard');
                speak("أهلاً بك سيادة العقيد علي العماري. تم تفعيل نظام السيادة بنجاح.");
            } else {
                alert("ACCESS DENIED");
                inputCode = "";
            }
        }

        function showPage(pId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + pId).classList.add('active-page');
            document.getElementById('btn-' + pId).classList.add('active');
            if(pId === 'radar' && !map) initMap();
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([13.84, 44.73], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function toggleRadar() {
            const isOn = document.getElementById('radarSwitch').checked;
            document.getElementById('radar').classList.toggle('scanning', isOn);
            speak(isOn ? "بدء الرصد التكتيكي في القطاع المركزي" : "إغلاق أنظمة الرصد");
        }

        function speak(msg) {
            const u = new SpeechSynthesisUtterance(msg);
            u.lang = 'ar-SA';
            window.speechSynthesis.speak(u);
        }

        function lockSystem() {
            document.getElementById('access-gate').style.display = 'flex';
        }
    </script>
</body>
</html>
