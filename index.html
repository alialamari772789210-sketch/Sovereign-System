<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة الدخول السيادية - النسخة الموحدة (توافق الأحرف)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0d1321; color: #00f2ff; margin: 0; overflow-x: hidden; }
        .cyber-input { background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); transition: all 0.3s; }
        .key-btn { background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.1); transition: all 0.1s; font-size: 0.8rem; font-weight: bold; }
        .key-btn:active { background: rgba(0, 242, 255, 0.3); transform: scale(0.95); }
        .welcome-anim { animation: fadeIn 1.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .spin-slow { animation: spin 10s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-4" onload="playWelcomeGreeting()">
    
    <header class="w-full flex justify-between items-center h-16 mb-6 border-b border-cyan-500/10">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-cyan-400">shield_lock</span>
            <h1 class="text-xs font-bold tracking-widest uppercase">SOVEREIGN AUTHENTICATION</h1>
        </div>
        <span class="material-symbols-outlined text-cyan-400 animate-pulse">verified_user</span>
    </header>

    <div class="w-full max-w-md flex flex-col items-center">
        <div class="w-32 h-32 mb-6 relative">
            <div class="absolute inset-0 border-2 border-dashed border-cyan-500/30 rounded-full spin-slow"></div>
            <div class="absolute inset-2 border border-cyan-400/50 rounded-full"></div>
            <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&q=80&w=400" 
                 class="w-full h-full object-cover rounded-full grayscale brightness-75 border-2 border-cyan-400 p-1">
        </div>

        <div class="text-center mb-8 welcome-anim">
            <h2 class="text-2xl font-black text-cyan-400 leading-tight mb-2">العقيد علي العماري</h2>
            <p class="text-[9px] opacity-60 uppercase tracking-[0.3em]">Identity Verification Required</p>
        </div>

        <div class="w-full mb-6">
            <div class="cyber-input h-16 rounded flex items-center justify-center text-3xl tracking-[0.4em] font-black shadow-[0_0_20px_rgba(0,242,255,0.1)]" id="display">
                </div>
        </div>

        <div class="w-full space-y-2">
            <div class="grid grid-cols-10 gap-1">
                <button class="key-btn h-11 rounded" onclick="press('Q')">Q</button>
                <button class="key-btn h-11 rounded" onclick="press('W')">W</button>
                <button class="key-btn h-11 rounded" onclick="press('E')">E</button>
                <button class="key-btn h-11 rounded" onclick="press('R')">R</button>
                <button class="key-btn h-11 rounded" onclick="press('T')">T</button>
                <button class="key-btn h-11 rounded" onclick="press('Y')">Y</button>
                <button class="key-btn h-11 rounded" onclick="press('U')">U</button>
                <button class="key-btn h-11 rounded" onclick="press('I')">I</button>
                <button class="key-btn h-11 rounded" onclick="press('O')">O</button>
                <button class="key-btn h-11 rounded" onclick="press('P')">P</button>
            </div>
            <div class="grid grid-cols-9 gap-1 px-2">
                <button class="key-btn h-11 rounded" onclick="press('A')">A</button>
                <button class="key-btn h-11 rounded" onclick="press('S')">S</button>
                <button class="key-btn h-11 rounded" onclick="press('D')">D</button>
                <button class="key-btn h-11 rounded" onclick="press('F')">F</button>
                <button class="key-btn h-11 rounded" onclick="press('G')">G</button>
                <button class="key-btn h-11 rounded" onclick="press('H')">H</button>
                <button class="key-btn h-11 rounded" onclick="press('J')">J</button>
                <button class="key-btn h-11 rounded" onclick="press('K')">K</button>
                <button class="key-btn h-11 rounded" onclick="press('L')">L</button>
            </div>
            <div class="grid grid-cols-10 gap-1">
                <button class="key-btn h-11 rounded" onclick="press('Z')">Z</button>
                <button class="key-btn h-11 rounded" onclick="press('X')">X</button>
                <button class="key-btn h-11 rounded" onclick="press('C')">C</button>
                <button class="key-btn h-11 rounded" onclick="press('V')">V</button>
                <button class="key-btn h-11 rounded" onclick="press('B')">B</button>
                <button class="key-btn h-11 rounded" onclick="press('N')">N</button>
                <button class="key-btn h-11 rounded" onclick="press('M')">M</button>
                <button class="key-btn h-11 rounded" onclick="press('1')">1</button>
                <button class="key-btn h-11 rounded" onclick="press('2')">2</button>
                <button class="key-btn h-11 rounded" onclick="press('3')">3</button>
            </div>
            <div class="grid grid-cols-9 gap-1 px-2">
                <button class="key-btn h-11 rounded" onclick="press('4')">4</button>
                <button class="key-btn h-11 rounded" onclick="press('5')">5</button>
                <button class="key-btn h-11 rounded" onclick="press('6')">6</button>
                <button class="key-btn h-11 rounded" onclick="press('7')">7</button>
                <button class="key-btn h-11 rounded" onclick="press('8')">8</button>
                <button class="key-btn h-11 rounded" onclick="press('9')">9</button>
                <button class="key-btn h-11 rounded" onclick="press('0')">0</button>
                <button class="key-btn h-11 rounded col-span-2 bg-red-600/20" onclick="clearInput()">DEL</button>
            </div>

            <button class="w-full h-14 bg-cyan-400 text-black font-black uppercase tracking-widest rounded shadow-[0_0_20px_#00f2ff] mt-6 hover:brightness-110 transition-all" onclick="verifyAccess()">
                Confirm Sovereign Access
            </button>
        </div>
    </div>

    <script>
        let inputStr = "";
        const ACCESS_KEY = "ALIC2A2026"; // الكود الموحد

        function press(key) {
            if(inputStr.length < 10) {
                inputStr += key;
                updateDisplay();
            }
        }

        function clearInput() {
            inputStr = "";
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('display').innerText = "*".repeat(inputStr.length);
        }

        function verifyAccess() {
            // التحويل للأحرف الكبيرة تلقائياً لضمان التوافق التام
            if(inputStr.toUpperCase() === ACCESS_KEY) {
                window.location.href = "dashboard.html";
            } else {
                alert("ACCESS DENIED: INVALID CREDENTIALS");
                clearInput();
            }
        }

        function playWelcomeGreeting() {
            const msg = "سيادة العقيد علي العماري، نظام التحقق جاهز. يرجى إدخال مفتاح الوصول السيادي.";
            const utterance = new SpeechSynthesisUtterance(msg);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
