<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN ACCESS | AEGIS</title>
    <style>
        :root { --bg: #0b1622; --cyan: #00d4ff; --gold: #d4af37; --btn: #162a3d; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 20px; overflow: hidden; text-transform: uppercase; }
        .commander-name { font-size: 2rem; color: var(--cyan); font-weight: bold; margin: 10px 0; }
        #display-box { width: 85%; height: 60px; background: rgba(0,0,0,0.5); border: 2px solid #1a3a5a; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--cyan); letter-spacing: 5px; }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; width: 95%; }
        .key { background: var(--btn); border: 1px solid #1f3d5a; flex: 1; padding: 15px 0; border-radius: 4px; text-align: center; color: var(--cyan); font-weight: bold; cursor: pointer; }
        .key:active { background: var(--cyan); color: #000; }
        .key.del { background: #3d1616; color: #ff3e3e; flex: 1.5; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; width: 95%; margin-top: 10px; }
        .enter-btn { background: linear-gradient(45deg, #0b1622, #1a3a5a); border: 2px solid var(--gold); color: var(--gold); padding: 18px; margin-top: 20px; font-weight: bold; letter-spacing: 5px; border-radius: 5px; width: 95%; text-align: center; }
    </style>
</head>
<body>
    <div class="commander-name">العقيد علي العماري</div>
    <div style="font-size:0.7rem; color:#555; margin-bottom:20px;">SOVEREIGN SYSTEM ACCESS GATE</div>
    <div id="display-box">********</div>
    <div class="kb-row">
        <div class="key" onclick="press('Q')">Q</div><div class="key" onclick="press('W')">W</div><div class="key" onclick="press('E')">E</div><div class="key" onclick="press('R')">R</div><div class="key" onclick="press('T')">T</div><div class="key" onclick="press('Y')">Y</div><div class="key" onclick="press('U')">U</div><div class="key" onclick="press('I')">I</div><div class="key" onclick="press('O')">O</div><div class="key" onclick="press('P')">P</div>
    </div>
    <div class="kb-row">
        <div class="key" onclick="press('A')">A</div><div class="key" onclick="press('S')">S</div><div class="key" onclick="press('D')">D</div><div class="key" onclick="press('F')">F</div><div class="key" onclick="press('G')">G</div><div class="key" onclick="press('H')">H</div><div class="key" onclick="press('J')">J</div><div class="key" onclick="press('K')">K</div><div class="key" onclick="press('L')">L</div><div class="key del" onclick="back()">⌫</div>
    </div>
    <div class="kb-row">
        <div class="key" onclick="press('Z')">Z</div><div class="key" onclick="press('X')">X</div><div class="key" onclick="press('C')">C</div><div class="key" onclick="press('V')">V</div><div class="key" onclick="press('B')">B</div><div class="key" onclick="press('N')">N</div><div class="key" onclick="press('M')">M</div>
    </div>
    <div class="num-grid">
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div><div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div>
        <div class="key" onclick="press('6')">6</div><div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div><div class="key" onclick="press('0')">0</div>
    </div>
    <div class="enter-btn" onclick="verify()">ENTER / دخول</div>
    <script>
        let code = "";
        const MASTER = "ALIC2A2026";
        function press(c) { if(code.length<10) { code+=c; update(); } }
        function back() { code=code.slice(0,-1); update(); }
        function update() { document.getElementById('display-box').innerText = "*".repeat(code.length) || "********"; }
        function verify() {
            if(code === MASTER) {
                const m = new SpeechSynthesisUtterance("أهلاً بك أيها القائد علي العمري. تم تفعيل نظام إيجيس.");
                m.lang = 'ar-SA'; window.speechSynthesis.speak(m);
                setTimeout(() => { window.location.href = "dashboard.html"; }, 2000);
            } else { alert("ACCESS DENIED"); code=""; update(); }
        }
    </script>
</body>
</html>
