<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN COMMAND | AEGIS</title>
    <style>
        :root {
            --bg-color: #0b1622;
            --btn-bg: #162a3d;
            --accent-cyan: #00d4ff;
            --gold: #d4af37;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .header-bar {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .commander-logo { width: 120px; margin-bottom: 10px; }
        
        .commander-name {
            font-size: 1.8rem;
            color: var(--accent-cyan);
            margin: 10px 0;
            font-weight: bold;
        }

        #display-box {
            width: 85%;
            height: 60px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #1a3a5a;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent-cyan);
            letter-spacing: 5px;
        }

        /* حاوية لوحة المفاتيح المحدثة */
        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            width: 95%;
            margin-bottom: 10px;
        }

        .key {
            background: var(--btn-bg);
            border: 1px solid #1f3d5a;
            padding: 12px 2px;
            border-radius: 4px;
            text-align: center;
            color: var(--accent-cyan);
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .key:active { background: var(--accent-cyan); color: #000; }
        .key.del { background: #3d1616; color: #ff3e3e; }

        .num-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            width: 95%;
        }
    </style>
</head>
<body>

<div class="header-bar">
    <span style="color:var(--accent-cyan)">🛡️</span>
    <span style="letter-spacing: 2px;">SOVEREIGN COMMAND</span>
    <span style="color:var(--accent-cyan)">((•))</span>
</div>

<img src="commander_logo.png" class="commander-logo" alt="Commander"> <div class="commander-name">العقيد علي العماري</div>
<div style="font-size: 0.7rem; color: #666; margin-bottom: 15px;">SOVEREIGN SYSTEM ACCESS GATE</div>

<div id="display-box">********</div>

<div class="keyboard-grid">
    <div class="key" onclick="add('Q')">Q</div><div class="key" onclick="add('W')">W</div>
    <div class="key" onclick="add('E')">E</div><div class="key" onclick="add('R')">R</div>
    <div class="key" onclick="add('T')">T</div><div class="key" onclick="add('Y')">Y</div>
    <div class="key" onclick="add('U')">U</div><div class="key" onclick="add('I')">I</div>
    <div class="key" onclick="add('O')">O</div><div class="key" onclick="add('P')">P</div>
</div>

<div class="keyboard-grid">
    <div class="key del" onclick="back()">⌫</div>
    <div class="key" onclick="add('A')">A</div><div class="key" onclick="add('S')">S</div>
    <div class="key" onclick="add('D')">D</div><div class="key" onclick="add('F')">F</div>
    <div class="key" onclick="add('G')">G</div><div class="key" onclick="add('H')">H</div>
    <div class="key" onclick="add('J')">J</div><div class="key" onclick="add('K')">K</div>
    <div class="key" onclick="add('L')">L</div>
</div>

<div class="keyboard-grid">
    <div style="grid-column: span 1.5;"></div> <div class="key" onclick="add('Z')">Z</div><div class="key" onclick="add('X')">X</div>
    <div class="key" onclick="add('C')">C</div><div class="key" onclick="add('V')">V</div>
    <div class="key" onclick="add('B')">B</div><div class="key" onclick="add('N')">N</div>
    <div class="key" onclick="add('M')">M</div>
    <div style="grid-column: span 1.5;"></div>
</div>

<div class="num-grid">
    <div class="key" onclick="add('1')">1</div><div class="key" onclick="add('2')">2</div>
    <div class="key" onclick="add('3')">3</div><div class="key" onclick="add('4')">4</div>
    <div class="key" onclick="add('5')">5</div>
    <div class="key" onclick="add('6')">6</div><div class="key" onclick="add('7')">7</div>
    <div class="key" onclick="add('8')">8</div><div class="key" onclick="add('9')">9</div>
    <div class="key" onclick="add('0')">0</div>
</div>

<script>
    let code = "";
    const SECRET = "Alic2A2026";

    function add(char) {
        code += char;
        document.getElementById('display-box').innerText = "*".repeat(code.length);
        if(code === SECRET) {
            validate();
        }
    }

    function back() {
        code = code.slice(0, -1);
        document.getElementById('display-box').innerText = "*".repeat(code.length) || "********";
    }

    function validate() {
        const msg = new SpeechSynthesisUtterance("تم التحقق. أهلاً بك أيها القائد علي العمري.");
        msg.lang = 'ar-SA';
        window.speechSynthesis.speak(msg);
        
        document.getElementById('display-box').style.borderColor = "#00ff41";
        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 2500);
    }
</script>

</body>
</html>
