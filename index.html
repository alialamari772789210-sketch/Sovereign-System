<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN COMMAND | AEGIS</title>
    <style>
        :root {
            --bg-color: #0b1622;
            --btn-bg: #162a3d;
            --accent-cyan: #00d4ff;
            --gold: #d4af37;
            --danger: #ff3e3e;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            height: 100vh;
        }

        .header-bar {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .commander-name {
            font-size: 1.8rem;
            color: var(--accent-cyan);
            font-weight: bold;
            margin: 5px 0;
        }

        #display-box {
            width: 85%;
            height: 55px;
            background: rgba(0,0,0,0.4);
            border: 2px solid #1a3a5a;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--accent-cyan);
            letter-spacing: 4px;
        }

        /* لوحة المفاتيح */
        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            width: 95%;
            margin-bottom: 8px;
        }

        .key {
            background: var(--btn-bg);
            border: 1px solid #1f3d5a;
            padding: 12px 0;
            border-radius: 4px;
            text-align: center;
            color: var(--accent-cyan);
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .key:active { background: var(--gold); color: #000; }
        
        .key.del { background: #3d1616; color: var(--danger); }
        
        /* زر الدخول النهائي */
        .btn-enter {
            grid-column: span 10;
            background: linear-gradient(45deg, #0b1622, #1a3a5a);
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 15px;
            margin-top: 10px;
            font-weight: bold;
            letter-spacing: 5px;
            border-radius: 5px;
            cursor: pointer;
            width: 95%;
            text-align: center;
        }

        .btn-enter:hover { background: var(--gold); color: black; }

        .num-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            width: 95%;
        }
    </style>
</head>
<body>

<div class="header-bar">
    <span style="color:var(--accent-cyan)">((•))</span>
    <span style="letter-spacing: 1px;">SOVEREIGN COMMAND</span>
    <span style="color:var(--accent-cyan)">🛡️</span>
</div>

<div class="commander-name">العقيد علي العماري</div>
<div style="font-size: 0.7rem; color: #555; margin-bottom: 15px;">SOVEREIGN SYSTEM ACCESS GATE</div>

<div id="display-box">********</div>

<div class="keyboard-grid">
    <div class="key" onclick="add('Q')">Q</div><div class="key" onclick="add('W')">W</div>
    <div class="key" onclick="add('E')">E</div><div class="key" onclick="add('R')">R</div>
    <div class="key" onclick="add('T')">T</div><div class="key" onclick="add('Y')">Y</div>
    <div class="key" onclick="add('U')">U</div><div class="key" onclick="add('I')">I</div>
    <div class="key" onclick="add('O')">O</div><div class="key" onclick="add('P')">P</div>
    
    <div class="key" onclick="add('A')">A</div><div class="key" onclick="add('S')">S</div>
    <div class="key" onclick="add('D')">D</div><div class="key" onclick="add('F')">F</div>
    <div class="key" onclick="add('G')">G</div><div class="key" onclick="add('H')">H</div>
    <div class="key" onclick="add('J')">J</div><div class="key" onclick="add('K')">K</div>
    <div class="key" onclick="add('L')">L</div><div class="key del" onclick="back()">⌫</div>

    <div style="grid-column: span 1;"></div>
    <div class="key" onclick="add('Z')">Z</div><div class="key" onclick="add('X')">X</div>
    <div class="key" onclick="add('C')">C</div><div class="key" onclick="add('V')">V</div>
    <div class="key" onclick="add('B')">B</div><div class="key" onclick="add('N')">N</div>
    <div class="key" onclick="add('M')">M</div>
    <div style="grid-column: span 2;"></div>
</div>

<div class="num-grid">
    <div class="key" onclick="add('1')">1</div><div class="key" onclick="add('2')">2</div>
    <div class="key" onclick="add('3')">3</div><div class="key" onclick="add('4')">4</div>
    <div class="key" onclick="add('5')">5</div>
    <div class="key" onclick="add('6')">6</div><div class="key" onclick="add('7')">7</div>
    <div class="key" onclick="add('8')">8</div><div class="key" onclick="add('9')">9</div>
    <div class="key" onclick="add('0')">0</div>
</div>

<div class="btn-enter" onclick="validate()">ENTER / دخول</div>

<script>
    let codeInput = "";
    const MASTER_KEY = "Alic2A2026";

    function add(char) {
        if(codeInput.length < 15) {
            codeInput += char;
            updateDisplay();
        }
    }

    function back() {
        codeInput = codeInput.slice(0, -1);
        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('display-box').innerText = "*".repeat(codeInput.length) || "********";
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ar-SA';
        window.speechSynthesis.speak(msg);
    }

    function validate() {
        if (codeInput === MASTER_KEY) {
            speak("أهلاً بك أيها القائد علي العمري. تم تفعيل نظام إيجيس تكتيكال.");
            document.getElementById('display-box').style.borderColor = "#00ff41";
            document.getElementById('display-box').style.color = "#00ff41";
            
            setTimeout(() => {
                window.location.href = "setup.html"; // سينقلك للشاشة الرئيسية
            }, 2000);
        } else {
            speak("رمز الدخول خاطئ. الوصول مرفوض.");
            codeInput = "";
            updateDisplay();
            document.getElementById('display-box').style.borderColor = "var(--danger)";
            setTimeout(() => {
                document.getElementById('display-box').style.borderColor = "#1a3a5a";
            }, 1000);
        }
    }
</script>

</body>
</html>
