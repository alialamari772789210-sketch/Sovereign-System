<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS SOVEREIGN CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #020617; color: #00f2ff; font-family: 'Courier New', monospace; overflow: hidden; }
        .page { display: none; height: 100vh; padding-bottom: 80px; overflow-y: auto; }
        .active-page { display: block; }
        
        /* تصميم الرادار */
        .radar-box { position: relative; width: 260px; height: 260px; border: 2px solid #00f2ff; border-radius: 50%; margin: 10px auto; background: radial-gradient(circle, #0a2d2d 0%, #020617 85%); }
        .sweeper { position: absolute; top: 50%; left: 50%; width: 50%; height: 2px; background: linear-gradient(to right, transparent, #00f2ff); transform-origin: left; animation: sweep 4s linear infinite; display: none; }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .scanning .sweeper { display: block; }
        
        #map { width: 100%; height: 200px; filter: invert(100%) hue-rotate(180deg) brightness(0.6); margin-top: 10px; }
        .nav-btn { transition: 0.3s; color: rgba(0, 242, 255, 0.4); }
        .nav-btn.active { color: #00f2ff; transform: translateY(-5px); }
    </style>
</head>
<body onload="initSystem()">

    <div id="page-dashboard" class="page active-page p-4">
        <header class="flex justify-between items-center mb-6 border-b border-cyan-900 pb-2">
            <div>
                <h1 class="text-sm font-black uppercase">STRATEGIC COMMAND</h1>
                <p class="text-[9px] text-cyan-500 uppercase">COLONEL: ALI AL-OMARI</p>
            </div>
            <div class="text-[10px] text-green-400 font-bold uppercase">UPLINK: ACTIVE</div>
        </header>

        <div class="grid grid-cols-1 gap-4">
            <div class="bg-cyan-950/20 border border-cyan-500/30 p-4 rounded-xl">
                <p class="text-[10px] opacity-50 uppercase">CURRENT SECTOR / القطاع النشط</p>
                <h2 id="dash-sector" class="text-xl font-bold">قعطبة - الضالع</h2>
                <div class="w-full bg-cyan-900 h-1 mt-2"><div class="bg-cyan-400 h-full w-[88%]"></div></div>
            </div>
        </div>
    </div>

    <div id="page-radar" class="page p-4 text-center">
        <div class="flex justify-between items-center mb-2">
            <span class="text-red-500 text-xs font-bold uppercase">▲ NORTH / الشمال ▲</span>
            <div class="flex items-center gap-2">
                <span class="text-[10px]">RADAR:</span>
                <input type="checkbox" id="radarMaster" onchange="toggleRadar()" class="w-5 h-5">
            </div>
        </div>
        
        <div id="radar" class="radar-box"><div class="sweeper"></div></div>
        <div id="map"></div>
    </div>

    <div id="page-jamming" class="page p-4">
        <h2 class="text-center text-purple-400 font-bold mb-4">ELECTRONIC WARFARE UNIT</h2>
        <button onclick="toggleJamming()" id="jamBtn" class="w-full py-8 border-2 border-purple-500 rounded-xl text-lg font-black bg-purple-900/10">
            تفعيل التشويش الشامل (250KM)
        </button>
    </div>

    <nav class="fixed bottom-0 w-full bg-slate-950/90 backdrop-blur-md border-t border-cyan-500/20 flex justify-around p-4">
        <div onclick="showPage('dashboard')" id="btn-dashboard" class="nav-btn active flex flex-col items-center">
            <span class="text-[10px] font-bold uppercase">MAIN</span>
        </div>
        <div onclick="showPage('radar')" id="btn-radar" class="nav-btn flex flex-col items-center">
            <span class="text-[10px] font-bold uppercase">RADAR</span>
        </div>
        <div onclick="showPage('jamming')" id="btn-jamming" class="nav-btn flex flex-col items-center">
            <span class="text-[10px] font-bold uppercase">JAMMING</span>
        </div>
    </nav>

    <script>
        let isRadarOn = false;
        let map;

        function showPage(pageId) {
            // تنقل فوري بدون تحميل الصفحة
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('page-' + pageId).classList.add('active-page');
            document.getElementById('btn-' + pageId).classList.add('active');
            
            if(pageId === 'radar' && !map) initMap();
        }

        function initSystem() {
            speak("نظام التنبيه الجغرافي جاهز يا سيادة العقيد.");
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([13.84, 44.73], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        function toggleRadar() {
            isRadarOn = document.getElementById('radarMaster').checked;
            const r = document.getElementById('radar');
            if(isRadarOn) {
                r.classList.add('scanning');
                speak("تم تفعيل الرادار. المسح الميداني مستمر حتى عند التنقل.");
            } else {
                r.classList.remove('scanning');
            }
        }

        function toggleJamming() {
            speak("تم تفعيل بروتوكول التشويش فوق منطقة قعطبة.");
            document.getElementById('jamBtn').classList.toggle('bg-red-900/40');
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'ar-SA';
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
