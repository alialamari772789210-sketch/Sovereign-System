<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة الدخول السيادية - النسخة النهائية الموحدة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0d1321; color: #00f2ff; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .num-btn { background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); transition: all 0.2s; }
        .num-btn:active { background: rgba(0, 242, 255, 0.2); transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-4">
    <header class="w-full flex justify-between items-center h-16 mb-8 border-b border-cyan-500/10">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-cyan-400">menu</span>
            <h1 class="text-xs font-bold tracking-[0.2em] uppercase">SOVEREIGN COMMAND | قيادة</h1>
        </div>
        <span class="material-symbols-outlined text-cyan-400">mic</span>
    </header>

    <div class="w-full max-w-sm flex flex-col items-center">
        <div class="w-48 h-48 mb-8 relative">
            <div class="absolute inset-0 border border-cyan-500/30 rounded shadow-[0_0_20px_rgba(0,242,255,0.1)]"></div>
            <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover grayscale opacity-80 p-1">
        </div>

        <div class="text-center mb-10 px-4">
            <h2 class="text-3xl font-black text-cyan-400 leading-tight mb-4">العقيد علي العماري مرحبا بك في المنظومة السيادية الشاملة</h2>
            <p class="text-sm opacity-60 font-light">Colonel Ali Al-Amari, welcome to the Sovereign Integrated System</p>
        </div>

        <div class="w-full mb-10">
            <div class="text-[10px] font-bold text-center mb-4 uppercase tracking-[0.2em]">ENTER ACCESS CODE / ادخل رمز التحقق</div>
            <div class="flex justify-center gap-2 mb-8">
                <div class="w-10 h-14 border-x border-cyan-500/40 flex items-center justify-center text-xl font-bold" id="p-1"></div>
                <div class="w-10 h-14 border-x border-cyan-500/10 flex items-center justify-center text-xl font-bold" id="p-2"></div>
                <div class="w-10 h-14 border-x border-cyan-500/10 flex items-center justify-center text-xl font-bold" id="p-3"></div>
                <div class="w-10 h-14 border-x border-cyan-500/10 flex items-center justify-center text-xl font-bold" id="p-4"></div>
                <div class="w-10 h-14 border-x border-cyan-500/10 flex items-center justify-center text-xl font-bold" id="p-5"></div>
            </div>

            <div class="grid grid-cols-3 gap-3 w-full max-w-[280px] mx-auto">
                <button class="num-btn h-14 rounded text-xl font-bold" onclick="add(1)">1</button>
                <button class="num-btn h-14 rounded text-xl font-bold" onclick="add(2)">2</button>
                <button class="num-btn h-14 rounded text-xl font-bold" onclick="add(3)">3</button>
                <button class="num-btn h-14 rounded text-xl font-bold" onclick="add(4)">4</button>
                <button class="num-btn h-14 rounded text-xl font-bold" onclick="add(5)">5</button>
                <button class="num-btn h-14 rounded text-xl font-bold" onclick="add(6)">6</button>
                <button class="num-btn h-14 rounded text-xl font-bold" onclick="add(7)">7</button>
                <button class="num-btn h-14 rounded text-xl font-bold" onclick="add(8)">8</button>
                <button class="num-btn h-14 rounded text-xl font-bold" onclick="add(9)">9</button>
                <button class="num-btn h-14 rounded text-xl flex items-center justify-center" onclick="clearP()"><span class="material-symbols-outlined">backspace</span></button>
                <button class="num-btn h-14 rounded text-xl font-bold" onclick="add(0)">0</button>
                <button class="h-14 rounded bg-cyan-400 text-black font-black text-sm shadow-[0_0_15px_#00f2ff]" onclick="verify()">OK</button>
            </div>
        </div>
    </div>

    <script>
        let p = "";
        function add(n) { if(p.length < 5) { p += n; update(); } }
        function clearP() { p = ""; update(); }
        function update() {
            for(let i=1; i<=5; i++) document.getElementById('p-'+i).innerText = p[i-1] ? "*" : "";
        }
        function verify() {
            if(p === "2026") window.location.href = "dashboard.html";
            else { alert("ACCESS DENIED"); clearP(); }
        }
    </script>
</body>
</html>
