<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN COMMAND | AEGIS</title>
    <style>
        :root {
            --bg-color: #0b1622;
            --btn-bg: #162a3d;
            --accent-cyan: #00d4ff;
            --gold: #d4af37;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            overflow: hidden;
        }

        /* الجزء العلوي (شريط الحالة) */
        .header-bar {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header-bar span { color: var(--accent-cyan); font-weight: bold; letter-spacing: 2px; }

        /* الصورة الشخصية والاسم */
        .profile-section { text-align: center; margin-bottom: 30px; }
        .profile-img {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            object-fit: cover;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .commander-name {
            font-size: 2rem;
            color: var(--accent-cyan);
            margin-top: 15px;
            font-weight: bold;
        }
        .sub-text { font-size: 0.8rem; letter-spacing: 3px; color: rgba(255,255,255,0.6); }

        /* حقل عرض الكود */
        #display-code {
            width: 85%;
            height: 60px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #1a3a5a;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: var(--accent-cyan);
        }

        /* لوحة المفاتيح المخصصة (كما في الصورة) */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            width: 95%;
            padding: 10px;
        }

        .key {
            background: var(--btn-bg);
            border: 1px solid #1f3d5a;
            padding: 15px 5px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            color: var(--accent-cyan);
            transition: 0.2s;
        }

        .key:active { background: var(--accent-cyan); color: black; }
        .key.delete { background: #2d1010; color: #ff3e3e; }

        .num-keys { grid-template-columns: repeat(5, 1fr); margin-top: 15px; }

    </style>
</head>
<body>

<div class="header-bar">
    <span>((•))</span>
    <span>SOVEREIGN COMMAND 🛡️</span>
</div>

<div class="profile-section">
    <img src="https://via.placeholder.com/150" class="profile-img" alt="Commander">
    <div class="commander-name">العقيد علي العماري</div>
    <div class="sub-text">SOVEREIGN SYSTEM ACCESS GATE</div>
    <div style="font-size: 0.7rem; color: #555; margin-top: 5px;">Voice Greeting Active</div>
</div>

<div id="display-code">********</div>

<div class="keyboard">
    <div class="key" onclick="press('Q')">Q</div><div class="key" onclick="press('W')">W</div>
    <div class="key" onclick="press('E')">E</div><div class="key" onclick="press('R')">R</div>
    <div class="key" onclick="press('T')">T</div><div class="key" onclick="press('Y')">Y</div>
    <div class="key" onclick="press('U')">U</div><div class="key" onclick="press('I')">I</div>
    <div class="key" onclick="press('O')">O</div><div class="key" onclick="press('P')">P</div>
    <div class="key" onclick="press('A')">A</div><div class="key" onclick="press('S')">S</div>
    <div class="key" onclick="press('D')">D</div><div class="key" onclick="press('F')">F</div>
    <div class="key" onclick="press('G')">G</div><div class="key" onclick="press('H')">H</div>
    <div class="key" onclick="press('J')">J</div><div class="key" onclick="press('K')">K</div>
    <div class="key" onclick="press('L')">L</div><div class="key delete" onclick="del()">⌫</div>
</div>

<div class="keyboard num-keys">
    <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div>
    <div class="key" onclick="press('3')">3</div><div class="key" onclick="press('4')">4</div>
    <div class="key" onclick="press('5')">5</div>
    <div class="key" onclick="press('6')">6</div><div class="key" onclick="press('7')">7</div>
    <div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
    <div class="key" onclick="press('0')">0</div>
</div>

<script>
    let inputCode = "";
    const MASTER_CODE = "Alic2A2026";

    function press(char) {
        inputCode += char;
        updateDisplay();
        if (inputCode === MASTER_CODE) {
            accessGranted();
        }
    }

    function del() {
        inputCode = inputCode.slice(0, -1);
        updateDisplay();
    }

    function updateDisplay() {
        // عرض نجوم بدلاً من الكود للحماية
        document.getElementById('display-code').innerText = "*".repeat(inputCode.length) || "********";
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'ar-SA';
        window.speechSynthesis.speak(msg);
    }

    function accessGranted() {
        speak("تم التحقق من الكود السيادي. أهلاً بك أيها القائد علي العمري. جاري فتح لوحة القيادة.");
        document.getElementById('display-code').style.borderColor = "#00ff41";
        document.getElementById('display-code').style.color = "#00ff41";
        
        setTimeout(() => {
            window.location.href = "dashboard.html"; // اسم الملف الرئيسي
        }, 3000);
    }
</script>

</body>
</html>
