<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدخول السيادية | COMMAND_OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #04080f; 
            color: #00f2ff; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: screen;
        }
        .auth-container {
            background: rgba(13, 19, 33, 0.9);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .key-btn {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.1);
            transition: all 0.2s;
            font-family: 'Courier New', Courier, monospace;
        }
        .key-btn:active {
            background: #00f2ff;
            color: #04080f;
            transform: scale(0.95);
        }
        .display-code {
            background: rgba(0, 0, 0, 0.4);
            letter-spacing: 0.5em;
            text-shadow: 0 0 10px #00f2ff;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body onload="welcomeProtocol()">

    <div class="auth-container p-6 rounded-3xl w-full max-w-[360px] border-t-2 border-cyan-500">
        <div class="text-center mb-6">
            <div class="flex justify-center mb-2">
                <span class="material-symbols-outlined text-4xl text-cyan-500 animate-pulse">admin_panel_settings</span>
            </div>
            <h1 class="text-sm font-black tracking-widest uppercase">نظام السيطرة الموحد</h1>
            <div class="flex items-center justify-center gap-2 mt-1">
                <span class="status-dot bg-green-500 animate-ping"></span>
                <span class="text-[8px] font-mono opacity-50 uppercase">Secure Link Active</span>
            </div>
        </div>

        <div class="display-code w-full p-4 rounded-xl border border-cyan-500/30 mb-6 text-center">
            <input type="password" id="display" readonly placeholder="••••••••" 
                class="bg-transparent border-none outline-none text-center text-2xl w-full text-cyan-400">
        </div>

        <div class="grid grid-cols-3 gap-3 mb-6">
            <button class="key-btn p-4 rounded-lg font-bold" onclick="addNum('1')">1</button>
            <button class="key-btn p-4 rounded-lg font-bold" onclick="addNum('2')">2</button>
            <button class="key-btn p-4 rounded-lg font-bold" onclick="addNum('3')">3</button>
            <button class="key-btn p-4 rounded-lg font-bold" onclick="addNum('4')">4</button>
            <button class="key-btn p-4 rounded-lg font-bold" onclick="addNum('5')">5</button>
            <button class="key-btn p-4 rounded-lg font-bold" onclick="addNum('6')">6</button>
            <button class="key-btn p-4 rounded-lg font-bold" onclick="addNum('7')">7</button>
            <button class="key-btn p-4 rounded-lg font-bold" onclick="addNum('8')">8</button>
            <button class="key-btn p-4 rounded-lg font-bold" onclick="addNum('9')">9</button>
            <button class="key-btn p-4 rounded-lg text-red-500" onclick="clearDisplay()">C</button>
            <button class="key-btn p-4 rounded-lg font-bold" onclick="addNum('0')">0</button>
            <button class="key-btn p-4 rounded-lg text-cyan-400" onclick="addChar('A')">A</button>
        </div>

        <button onclick="verifyProtocol()" class="w-full py-4 bg-cyan-500 text-black font-black uppercase tracking-[0.2em] rounded-xl shadow-[0_0_20px_rgba(0,242,255,0.2)] active:scale-95 transition-all">
            تأكيد العبور السيادي
        </button>
        
        <div id="alert-box" class="mt-4 text-[9px] text-center font-bold opacity-0 transition-opacity uppercase tracking-widest text-red-500">
            Access Denied: Unauthorized Entry
        </div>
    </div>

    <script>
        let inputCode = "";

        function welcomeProtocol() {
            const msg = "سيادة العقيد علي العماري، نظام COMMAND OS بانتظار كود العبور الخاص بك لتفعيل كافة الصلاحيات الميدانية.";
            speak(msg);
        }

        function addNum(n) {
            inputCode += n;
            document.getElementById('display').value = inputCode;
        }

        function addChar(c) {
            inputCode += c;
            document.getElementById('display').value = inputCode;
        }

        function clearDisplay() {
            inputCode = "";
            document.getElementById('display').value = "";
        }

        function verifyProtocol() {
            // كود العبور الافتراضي: Alic2A2026 (يمكنك إدخاله يدوياً أو تعديل المنطق)
            // ملاحظة: لوحة المفاتيح تغطي الأرقام و حرف A، للدقة يمكنك تعديل الكود البرمجي هنا
            if(inputCode === "2026") { // مثال للتبسيط أو ضع الكود الكامل
                accessGranted();
            } else if (inputCode.includes("2026")) { 
                accessGranted();
            } else {
                document.getElementById('alert-box').style.opacity = "1";
                speak("فشل التحقق. الكود غير صحيح.");
                setTimeout(() => {
                    document.getElementById('alert-box').style.opacity = "0";
                    clearDisplay();
                }, 2000);
            }
        }

        function accessGranted() {
            speak("تم قبول الكود السيادي. أهلاً بك يا سيادة العقيد. جاري تشغيل بروتوكولات الميدان.");
            document.body.style.backgroundColor = "#001a1a";
            setTimeout(() => window.location.href = 'setup.html', 2500);
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'ar-SA';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
