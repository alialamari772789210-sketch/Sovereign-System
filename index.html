<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS | نظام التحقق السيادي</title>
    <style>
        :root {
            --gold: #d4af37;
            --bg: #050a0f;
            --red: #ff3e3e;
            --green: #00ff41;
        }

        body {
            background: radial-gradient(circle at center, #0d1b2a 0%, var(--bg) 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-frame {
            width: 420px;
            padding: 40px;
            background: rgba(10, 20, 30, 0.95);
            border: 1px solid var(--gold);
            border-radius: 5px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(212, 175, 55, 0.1);
            text-align: center;
            position: relative;
        }

        /* تأثير خطوط المسح الراداري */
        .login-frame::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--gold);
            opacity: 0.3;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        h2 { 
            color: var(--gold); 
            letter-spacing: 5px; 
            font-size: 1.5rem; 
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* حقل الإدخال - يقبل كل شيء */
        .input-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        #authCode {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #2c3e50;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 4px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        #authCode:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .btn-access {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to bottom, #d4af37, #aa8a2e);
            border: none;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .btn-access:active { transform: scale(0.98); }

        #status-msg {
            margin-top: 20px;
            font-size: 0.85rem;
            height: 20px;
            font-weight: bold;
        }

        /* تلميح نوع لوحة المفاتيح للأجهزة المحمولة */
        input::placeholder { font-size: 0.9rem; color: #444; letter-spacing: 0; }
    </style>
</head>
<body>

<div class="login-frame">
    <h2>AEGIS TACTICAL</h2>
    <p style="color: #666; font-size: 0.75rem; margin-top: -20px; margin-bottom: 30px;">بروتوكول التحقق من الهوية القيادي</p>
    
    <div class="input-wrapper">
        <input type="text" id="authCode" placeholder="أدخل رمز التفويض السيادي" autocomplete="off">
    </div>
    
    <button onclick="executeAuth()" class="btn-access">بدء بروتوكول الدخول</button>

    <div id="status-msg"></div>
</div>

<script>
    const KEY_SIG = "Alic2A2026";

    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'ar-SA';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function executeAuth() {
        const val = document.getElementById('authCode').value;
        const status = document.getElementById('status-msg');

        if (val === KEY_SIG) {
            status.style.color = var(--green);
            status.innerText = "✓ تم التحقق من الكود الموحد. جاري المصادقة...";
            speak("أهلاً بك أيها القائد علي العمري. تم تفعيل نظام إيجيس. جاري تحويلك لغرفة العمليات.");
            
            setTimeout(() => {
                window.location.href = "setup.html";
            }, 3000);
        } else {
            status.style.color = var(--red);
            status.innerText = "✗ خطأ: رمز التفويض غير صحيح.";
            speak("الوصول مرفوض. تم تسجيل محاولة الدخول غير المصرح بها.");
            // مسح الحقل لإجبار المستخدم على البدء من جديد
            document.getElementById('authCode').value = "";
        }
    }

    // دعم ضغط Enter من لوحة المفاتيح الشاملة
    document.getElementById('authCode').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') executeAuth();
    });
</script>

</body>
</html>
