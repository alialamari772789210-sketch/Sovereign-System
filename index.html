<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدخول السيادية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #080e1c; color: #00f2ff; margin: 0; overflow-x: hidden; }
        .num-btn { background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2); transition: all 0.2s; }
        .num-btn:active { background: #00f2ff; color: #080e1c; transform: scale(0.95); }
        .scanner-line { height: 1px; background: linear-gradient(90deg, transparent, #00f2ff, transparent); position: absolute; width: 100%; top: 0; animation: scan 4s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-4 relative">
    <div class="scanner-line"></div>
    <header class="w-full flex justify-between items-center h-16 border-b border-cyan-500/10 mb-8">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-cyan-400">shield_lock</span>
            <h1 class="text-xs font-bold tracking-[0.2em] uppercase">STRATEGIC COMMAND</h1>
        </div>
    </header>

    <div class="w-full max-w-sm flex flex-col items-center">
        <div class="w-32 h-32 mb-6 relative">
            <div class="absolute inset-0 border border-cyan-500/40 rounded shadow-[0_0_20px_rgba(0,242,255,0.1)]"></div>
            <img src="https://images.unsplash.com/photo-1590400500058-b3630ae2b520?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover grayscale brightness-75 p-0.5">
        </div>

        <div class="text-center mb-8 px-4">
            <h2 class="text-2xl font-black text-cyan-400 leading-tight mb-2 uppercase">العقيد علي العماري</h2>
            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">بوابة الدخول السيادية الشاملة</p>
        </div>

        <div class="flex justify-center gap-1 mb-10" id="pin-display">
            <div class="w-6 h-8 border-b-2 border-cyan-500/40 flex items-center justify-center text-lg font-bold" id="p-1"></div>
            <div class="w-6 h-8 border-b-2 border-cyan-500/40 flex items-center justify-center text-lg font-bold" id="p-2"></div>
            <div class="w-6 h-8 border-b-2 border-cyan-500/40 flex items-center justify-center text-lg font-bold" id="p-3"></div>
            <div class="w-6 h-8 border-b-2 border-cyan-500/40 flex items-center justify-center text-lg font-bold" id="p-4"></div>
            <div class="w-6 h-8 border-b-2 border-cyan-500/40 flex items-center justify-center text-lg font-bold" id="p-5"></div>
            <div class="w-6 h-8 border-b-2 border-cyan-500/40 flex items-center justify-center text-lg font-bold" id="p-6"></div>
            <div class="w-6 h-8 border-b-2 border-cyan-500/40 flex items-center justify-center text-lg font-bold" id="p-7"></div>
            <div class="w-6 h-8 border-b-2 border-cyan-500/40 flex items-center justify-center text-lg font-bold" id="p-8"></div>
            <div class="w-6 h-8 border-b-2 border-cyan-500/40 flex items-center justify-center text-lg font-bold" id="p-9"></div>
            <div class="w-6 h-8 border-b-2 border-cyan-500/40 flex items-center justify-center text-lg font-bold" id="p-10"></div>
        </div>

        <div class="grid grid-cols-4 gap-2 w-full max-w-[320px]">
            <button class="num-btn h-12 rounded font-bold" onclick="add('A')">A</button>
            <button class="num-btn h-12 rounded font-bold" onclick="add('L')">L</button>
            <button class="num-btn h-12 rounded font-bold" onclick="add('I')">I</button>
            <button class="num-btn h-12 rounded font-bold" onclick="add('C')">C</button>
            <button class="num-btn h-12 rounded font-bold" onclick="add('2')">2</button>
            <button class="num-btn h-12 rounded font-bold" onclick="add('0')">0</button>
            <button class="num-btn h-12 rounded font-bold" onclick="add('6')">6</button>
            <button class="num-btn h-12 rounded text-red-500" onclick="clearP()"><span class="material-symbols-outlined">backspace</span></button>
        </div>

        <button class="w-full mt-8 py-4 bg-cyan-400 text-black font-black text-xs uppercase tracking-[0.3em] rounded shadow-[0_0_20px_#00f2ff]" onclick="verify()">Execute Access</button>
    </div>

    <script>
        let p = "";
        const correctCode = "ALIC2A2026";
        function add(n) { if(p.length < 10) { p += n; update(); } }
        function clearP() { p = ""; update(); }
        function update() { for(let i=1; i<=10; i++) document.getElementById('p-'+i).innerText = p[i-1] ? "*" : ""; }
        
        function verify() {
            if(p.toUpperCase() === correctCode) {
                const msg = "العقيد علي العماري، مرحبا بك في المنظومة السيادية الشاملة. تم منح صلاحيات الوصول.";
                speak(msg);
                setTimeout(() => { window.location.href = "dashboard.html"; }, 2500);
            } else {
                alert("ACCESS DENIED");
                clearP();
            }
        }
        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang = 'ar-SA'; window.speechSynthesis.speak(u); }
    </script>
</body>
</html>
