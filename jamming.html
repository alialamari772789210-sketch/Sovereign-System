<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التشويش الشامل - الحرب الإلكترونية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #020617; color: #facc15; margin: 0; overflow: hidden; }
        .jammer-wave { position: absolute; border: 2px solid rgba(250, 204, 21, 0.3); border-radius: 50%; animation: ripple 3s linear infinite; opacity: 0; }
        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 500px; height: 500px; opacity: 0; }
        }
        .frequency-bar { width: 4px; background: #facc15; animation: bounce 0.5s ease-in-out infinite alternate; }
        @keyframes bounce { from { height: 10px; } to { height: 40px; } }
        .cyber-panel { background: rgba(251, 191, 36, 0.05); border: 1px solid rgba(251, 191, 36, 0.2); }
        .active-glow { box-shadow: 0 0 20px rgba(250, 204, 21, 0.2); border-color: #facc15; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-6" onload="initiateJammingSys()">

    <header class="flex justify-between items-center mb-8 border-b border-yellow-500/20 pb-4">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-yellow-500 animate-pulse">settings_input_antenna</span>
            <div>
                <h1 class="text-xs font-black tracking-widest uppercase text-yellow-500">Electronic Warfare Unit</h1>
                <div class="text-[9px] font-mono opacity-60 uppercase">Jamming Protocol v7.2.5 | 250KM Range</div>
            </div>
        </div>
        <div id="signal-status" class="text-[9px] font-bold text-yellow-500 bg-yellow-950/30 px-2 py-1 rounded border border-yellow-500/30">
            SIGNAL: CLEAR
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center gap-8 relative">
        <div class="relative w-64 h-64 flex items-center justify-center">
            <div id="wave-container" class="absolute inset-0 flex items-center justify-center pointer-events-none"></div>
            <div class="z-10 bg-slate-950 p-6 rounded-full border-2 border-yellow-500/50 shadow-[0_0_30px_rgba(250,204,21,0.1)]">
                <span class="material-symbols-outlined text-6xl">leak_remove</span>
            </div>
        </div>

        <div class="flex gap-1 h-12 items-end">
            <div class="frequency-bar" style="animation-delay: 0.1s"></div>
            <div class="frequency-bar" style="animation-delay: 0.3s"></div>
            <div class="frequency-bar" style="animation-delay: 0.2s"></div>
            <div class="frequency-bar" style="animation-delay: 0.4s"></div>
            <div class="frequency-bar" style="animation-delay: 0.1s"></div>
            <div class="frequency-bar" style="animation-delay: 0.5s"></div>
        </div>

        <div class="w-full max-w-sm space-y-4">
            <div class="cyber-panel p-4 rounded-lg flex justify-between items-center">
                <div>
                    <div class="text-[10px] uppercase font-bold opacity-60">التغطية الحالية</div>
                    <div class="text-xl font-black">250 KM</div>
                </div>
                <div class="text-right">
                    <div class="text-[10px] uppercase font-bold opacity-60">النمط</div>
                    <div id="mode-display" class="text-xs font-bold text-yellow-500 uppercase">Wide-Spectrum</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="setJammingMode('GNSS')" class="cyber-panel p-3 rounded font-bold text-[10px] uppercase hover:bg-yellow-500/10 transition-all">
                    GNSS Blocking
                </button>
                <button onclick="setJammingMode('COMM')" class="cyber-panel p-3 rounded font-bold text-[10px] uppercase hover:bg-yellow-500/10 transition-all">
                    Comm Override
                </button>
            </div>

            <button id="master-jam-btn" onclick="toggleJamming()" class="w-full py-5 bg-yellow-500 text-black font-black text-xs uppercase tracking-[0.4em] rounded-lg shadow-[0_0_20px_rgba(250,204,21,0.3)] active:scale-95 transition-all">
                Activate Master Jamming
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-2 bg-slate-950/95 backdrop-blur-3xl border-t border-yellow-500/10">
        <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center text-yellow-500/40">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[9px] font-bold uppercase mt-1">Main</span>
        </button>
        <div class="flex flex-col items-center text-black bg-yellow-500 px-6 py-2 rounded-lg shadow-[0_0_15px_#facc15]">
            <span class="material-symbols-outlined">sensors_off</span>
            <span class="text-[10px] font-black uppercase">JAMMING</span>
        </div>
        <button onclick="window.location.href='radar.html'" class="flex flex-col items-center text-yellow-500/40">
            <span class="material-symbols-outlined">radar</span>
            <span class="text-[9px] font-bold uppercase mt-1">Radar</span>
        </button>
    </nav>

    <script>
        let isJamming = false;

        function initiateJammingSys() {
            const msg = "سيادة العقيد علي العماري، نظام التشويش الشامل جاهز للتفعيل. مديات مئتين وخمسين كيلومتر تحت السيطرة الإلكترونية.";
            speak(msg);
        }

        function toggleJamming() {
            isJamming = !isJamming;
            const btn = document.getElementById('master-jam-btn');
            const status = document.getElementById('signal-status');
            const container = document.getElementById('wave-container');

            if(isJamming) {
                btn.classList.replace('bg-yellow-500', 'bg-red-600');
                btn.classList.add('text-white');
                btn.innerText = "Deactivate All Jamming";
                status.innerText = "SIGNAL: JAMMED / ACTIVE";
                status.classList.replace('text-yellow-500', 'text-red-500');
                startWaves();
                speak("تم تفعيل التشويش الشامل. جاري حجب كافة الترددات ضمن النطاق السيادي.");
            } else {
                btn.classList.replace('bg-red-600', 'bg-yellow-500');
                btn.classList.remove('text-white');
                btn.innerText = "Activate Master Jamming";
                status.innerText = "SIGNAL: CLEAR";
                status.classList.replace('text-red-500', 'text-yellow-500');
                container.innerHTML = "";
                speak("تم إيقاف التشويش. عودة الإشارات للحالة الطبيعية.");
            }
        }

        function startWaves() {
            const container = document.getElementById('wave-container');
            setInterval(() => {
                if(!isJamming) return;
                const wave = document.createElement('div');
                wave.className = 'jammer-wave';
                container.appendChild(wave);
                setTimeout(() => wave.remove(), 3000);
            }, 1000);
        }

        function setJammingMode(mode) {
            document.getElementById('mode-display').innerText = mode;
            speak(`تم الانتقال إلى نمط ${mode}`);
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'ar-SA';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
