<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELECTRONIC WARFARE | AEGIS JAMMING</title>
    <style>
        :root {
            --signal-purple: #9b59b6;
            --deep-violet: #2e1a47;
            --gold: #d4af37;
            --bg-black: #050505;
        }

        body {
            background-color: var(--bg-black);
            color: var(--signal-purple);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* شاشة عرض الترددات */
        .spectrum-analyzer {
            width: 95%;
            height: 300px;
            margin: 20px auto;
            border: 1px solid var(--signal-purple);
            background: linear-gradient(to bottom, #0a0a0a, #1a0a25);
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 10px;
            box-shadow: inset 0 0 30px rgba(155, 89, 182, 0.2);
        }

        /* أعمدة التردد المتحركة */
        .frequency-bar {
            width: 8px;
            background: var(--signal-purple);
            transition: height 0.1s ease;
            box-shadow: 0 0 10px var(--signal-purple);
        }

        .jamming-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            text-align: center;
        }

        .control-unit {
            border: 1px solid var(--gold);
            padding: 15px;
            background: rgba(212, 175, 55, 0.05);
        }

        .btn-jam {
            grid-column: span 3;
            background: transparent;
            border: 2px solid var(--signal-purple);
            color: white;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-jam:hover {
            background: var(--signal-purple);
            box-shadow: 0 0 30px var(--signal-purple);
        }

        .active-jamming {
            animation: pulse-red 0.5s infinite;
        }

        @keyframes pulse-red {
            0% { border-color: var(--signal-purple); }
            50% { border-color: #ff0000; box-shadow: 0 0 40px #ff0000; }
            100% { border-color: var(--signal-purple); }
        }

        .status-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            color: var(--gold);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="spectrum-analyzer" id="spectrum">
    </div>

<div class="status-overlay">
    STATUS: SCANNING SPECTRUM...<br>
    RANGE: 250 KM ACTIVE<br>
    MODE: SOVEREIGN SILENCE
</div>

<div class="jamming-controls">
    <div class="control-unit">
        <label>نظام GPS</label>
        <div style="color: #555;">[DECOUPLED]</div>
    </div>
    <div class="control-unit">
        <label>اتصالات العدو</label>
        <div style="color: #555;">[INTERCEPT READY]</div>
    </div>
    <div class="control-unit">
        <label>ترددات الدرونات</label>
        <div style="color: #555;">[SCANNING]</div>
    </div>
    
    <button class="btn-jam" id="jamBtn" onclick="toggleJamming()">تفعيل التشويش الشامل (MAX POWER)</button>
</div>

<script>
    // إنشاء محلل الطيف التخيلي
    const spectrum = document.getElementById('spectrum');
    const bars = [];
    for (let i = 0; i < 40; i++) {
        const bar = document.createElement('div');
        bar.className = 'frequency-bar';
        bar.style.height = Math.random() * 100 + '%';
        spectrum.appendChild(bar);
        bars.push(bar);
    }

    function animateSpectrum() {
        bars.forEach(bar => {
            const noise = isJamming ? Math.random() * 95 + 5 : Math.random() * 40 + 10;
            bar.style.height = noise + '%';
        });
        requestAnimationFrame(animateSpectrum);
    }
    animateSpectrum();

    let isJamming = false;
    function toggleJamming() {
        const btn = document.getElementById('jamBtn');
        isJamming = !isJamming;

        if (isJamming) {
            btn.innerText = "جاري التشويش.. النطاق تحت السيطرة";
            btn.classList.add('active-jamming');
            speak("بروتوكول التشويش الشامل مفعل. تم عزل النطاق في مدى مئتين وخمسين كيلومتراً.");
        } else {
            btn.innerText = "تفعيل التشويش الشامل (MAX POWER)";
            btn.classList.remove('active-jamming');
            speak("تم إيقاف التشويش. العودة لوضع الرصد الصامت.");
        }
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'ar-SA';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    window.onload = () => {
        speak("نظام الحرب الإلكترونية جاهز. القائد علي العمري، بانتظار أمر عزل الطيف.");
    };
</script>

</body>
</html>
