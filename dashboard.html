<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة الاستراتيجية - المنظومة السيادية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #0d1321; color: #00f2ff; margin: 0; padding-bottom: 80px; }
        .cyber-card { background: rgba(13, 19, 33, 0.8); border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(10px); }
        .scan-line { height: 2px; background: rgba(0, 242, 255, 0.5); position: absolute; width: 100%; top: 0; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .grid-bg { background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="grid-bg min-h-screen p-4">
    <header class="flex justify-between items-center mb-6 border-b border-cyan-500/30 pb-4">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-cyan-400">dashboard_customize</span>
            <h1 class="text-xs font-bold tracking-widest uppercase">STRATEGIC COMMAND DASHBOARD</h1>
        </div>
        <div class="flex flex-col items-end">
            <div id="current-region" class="text-xs font-bold text-white">المنطقة: جاري التحميل...</div>
            <div class="text-[10px] text-cyan-400 font-mono uppercase tracking-tighter">Satellite Link: Active</div>
        </div>
    </header>

    <div class="grid grid-cols-1 gap-4">
        <div class="cyber-card h-48 rounded relative overflow-hidden">
            <div class="scan-line"></div>
            <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=800')] bg-cover opacity-40"></div>
            <div class="absolute bottom-2 right-2 flex gap-2">
                <span class="text-[8px] bg-red-600 text-white px-1 font-bold">REC</span>
                <span class="text-[8px] bg-cyan-500 text-black px-1 font-bold">SAT-LIVE</span>
            </div>
            <div class="absolute inset-0 flex items-center justify-center">
                <span class="material-symbols-outlined text-4xl animate-pulse opacity-50">target</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="cyber-card p-4 rounded text-center">
                <div class="text-[10px] opacity-60 uppercase mb-1">التهديدات المكتشفة</div>
                <div class="text-2xl font-black text-red-500">00</div>
            </div>
            <div class="cyber-card p-4 rounded text-center">
                <div class="text-[10px] opacity-60 uppercase mb-1">حالة المنظومة</div>
                <div class="text-2xl font-black text-green-400">100%</div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-2">
            <button onclick="window.location.href='radar.html'" class="cyber-card p-6 rounded flex flex-col items-center gap-3 border-l-4 border-l-cyan-400">
                <span class="material-symbols-outlined text-3xl">radar</span>
                <span class="text-xs font-bold">الرادار التكتيكي</span>
            </button>
            <button onclick="window.location.href='evolution.html'" class="cyber-card p-6 rounded flex flex-col items-center gap-3 border-l-4 border-l-cyan-400">
                <span class="material-symbols-outlined text-3xl">auto_mode</span>
                <span class="text-xs font-bold">نواة التطور</span>
            </button>
            <div class="cyber-card p-6 rounded flex flex-col items-center gap-3 opacity-50 cursor-not-allowed">
                <span class="material-symbols-outlined text-3xl">emergency_share</span>
                <span class="text-xs font-bold">الاستجابة السريعة</span>
            </div>
            <div class="cyber-card p-6 rounded flex flex-col items-center gap-3 opacity-50 cursor-not-allowed">
                <span class="material-symbols-outlined text-3xl">hub</span>
                <span class="text-xs font-bold">شبكة الاتصال</span>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-2 bg-slate-950/90 backdrop-blur-2xl border-t border-cyan-500/20">
        <div class="flex flex-col items-center justify-center text-black bg-cyan-400 rounded-sm py-1 px-3 shadow-[0_0_12px_#00f2ff]">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[10px] uppercase font-bold">DASHBOARD</span>
        </div>
        <button onclick="window.location.href='radar.html'" class="flex flex-col items-center justify-center text-cyan-400/50">
            <span class="material-symbols-outlined">radar</span>
            <span class="text-[10px] uppercase font-bold">RADAR</span>
        </button>
        <button onclick="window.location.href='setup.html'" class="flex flex-col items-center justify-center text-cyan-400/50">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] uppercase font-bold">SETUP</span>
        </button>
    </nav>

    <script>
        // استرجاع اسم المنطقة من التخزين المحلي
        const savedRegion = localStorage.getItem('region') || "غير محددة";
        document.getElementById('current-region').innerText = `المنطقة: ${savedRegion}`;
    </script>
</body>
</html>
