<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة الاستراتيجية - مركز التحكم السيادي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #0d1321; 
            color: #00f2ff; 
            margin: 0; 
            padding-bottom: 90px;
            overflow-x: hidden;
        }
        .cyber-card { 
            background: rgba(13, 19, 33, 0.8); 
            border: 1px solid rgba(0, 242, 255, 0.2); 
            backdrop-filter: blur(15px); 
        }
        .scan-line { 
            height: 2px; 
            background: rgba(0, 242, 255, 0.6); 
            position: absolute; 
            width: 100%; 
            top: 0; 
            animation: scan 4s linear infinite; 
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .grid-bg { 
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px); 
            background-size: 25px 25px; 
        }
        .pulse-ready { animation: ready-glow 2s infinite; }
        @keyframes ready-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="grid-bg min-h-screen p-4" onload="activateCommandCenter()">
    <header class="flex justify-between items-center mb-6 border-b border-cyan-500/30 pb-4">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-cyan-400">leaderboard</span>

            <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=800')] bg-cover opacity-20 grayscale"></div>
            
            <div class="absolute inset-0 flex items-center justify-center opacity-30 pointer-events-none">

                <div class="w-20 h-20 border border-cyan-400 rounded-full"></div>
            </div>

            <div class="absolute top-4 left-4 font-mono text-[9px] space-y-1">
                <div class="bg-black/60 p-1 border-l-2 border-cyan-400">LAT: 13.9617° N</div>
                <div class="bg-black/60 p-1 border-l-2 border-cyan-400">LONG: 44.7314° E</div>
                <div class="bg-black/60 p-1 border-l-2 border-cyan-400">ALT: 35,786 KM</div>

                <div class="bg-black/80 p-3 rounded border border-cyan-500/30">

                </div>
                <span class="material-symbols-outlined text-4xl text-cyan-400 drop-shadow-[0_0_10px_#00f2ff]">satellite_alt</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="cyber-card p-4 rounded-lg border-r-4 border-green-500">
                <div class="text-[9px] opacity-60 uppercase mb-1">جاهزية المنظومة</div>
                <div class="text-xl font-black text-green-400">100%</div>
            </div>
            <div class="cyber-card p-4 rounded-lg border-r-4 border-cyan-500">
                <div class="text-[9px] opacity-60 uppercase mb-1">تشفير البيانات</div>
                <div class="text-xl font-black text-cyan-400">SOVEREIGN</div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-2">
            <button onclick="window.location.href='radar.html'" class="cyber-card p-6 rounded-xl flex flex-col items-center gap-3 hover:bg-cyan-900/30 transition-all active:scale-95">
                <span class="material-symbols-outlined text-3xl text-cyan-400">radar</span>
                <span class="text-[11px] font-black uppercase">الرادار التكتيكي</span>
            </button>
            <button onclick="window.location.href='evolution.html'" class="cyber-card p-6 rounded-xl flex flex-col items-center gap-3 hover:bg-cyan-900/30 transition-all active:scale-95">

                <span class="text-[11px] font-black uppercase">نواة التطور</span>
            </button>

                <span class="material-symbols-outlined text-3xl text-red-500">security_update_warning</span>
                <span class="text-[11px] font-black text-red-400 uppercase">الهجوم السيبراني</span>
            </button>
            <button onclick="window.location.href='setup.html'" class="cyber-card p-6 rounded-xl flex flex-col items-center gap-3 hover:bg-cyan-900/30 transition-all active:scale-95">

                <span class="text-[11px] font-black uppercase">الإعدادات</span>

        <div class="flex flex-col items-center justify-center text-black bg-cyan-400 rounded-xl py-2 px-8 shadow-[0_0_20px_rgba(0,242,255,0.4)]">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[10px] uppercase font-black">Dashboard</span>

        <button onclick="window.location.href='radar.html'" class="flex flex-col items-center justify-center text-cyan-400/40">

            <span class="text-[9px] uppercase font-bold mt-1">Setup</span>
        </button>
    </nav>
