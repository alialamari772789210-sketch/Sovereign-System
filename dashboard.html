<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة الاستراتيجية - SOVEREIGN_OS v7.2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050a14; color: #00f2ff; margin: 0; overflow-x: hidden; padding-bottom: 90px; }
        .stat-card { background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.1); border-right: 3px solid #00f2ff; transition: 0.3s; }
        .stat-card:hover { background: rgba(0, 242, 255, 0.08); transform: translateX(-5px); }
        .sat-link-anim { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .scan-line { height: 1px; background: rgba(0, 242, 255, 0.2); position: absolute; width: 100%; top: 0; animation: scan 10s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="p-4" onload="initiateDashboard()">
    
    <header class="flex justify-between items-center mb-6 border-b border-cyan-500/10 pb-4 relative">
        <div class="scan-line"></div>
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full border-2 border-cyan-400 p-0.5 shadow-[0_0_15px_rgba(0,242,255,0.3)]">
                <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&q=80&w=100" class="w-full h-full object-cover rounded-full grayscale">
            </div>
            <div>
                <h1 class="text-[10px] font-black tracking-widest uppercase">Strategic Dashboard</h1>
                <div class="text-xs font-bold text-cyan-400">العقيد علي العماري</div>
            </div>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[9px] font-mono opacity-50">SAT_LINK: 300KM</span>
            <div class="flex items-center gap-1">
                <span class="w-2 h-2 bg-green-500 rounded-full sat-link-anim"></span>
                <span class="text-[10px] font-bold text-green-400 uppercase tracking-tighter">Connected</span>
            </div>
        </div>
    </header>

    <main class="space-y-4">
        <div class="bg-cyan-950/20 border border-cyan-500/20 p-5 rounded-xl relative overflow-hidden">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <div class="text-[9px] uppercase opacity-60 mb-1">Current Sector / القطاع النشط</div>
                    <div id="sector-display" class="text-2xl font-black text-white tracking-tighter">WAITING_FOR_DATA...</div>
                </div>
                <span class="material-symbols-outlined text-cyan-400 text-3xl">satellite_alt</span>
            </div>
            <div class="h-1 bg-cyan-900 rounded-full overflow-hidden">
                <div class="h-full bg-cyan-400 w-3/4 shadow-[0_0_10px_#00f2ff]"></div>
            </div>
            <div class="flex justify-between mt-2 text-[9px] font-mono opacity-50 uppercase">
                <span>Signal Strength: 88%</span>
                <span>Uplink Secure</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="stat-card p-4 rounded-lg" onclick="window.location.href='radar.html'">
                <span class="material-symbols-outlined text-cyan-400 mb-2">radar</span>
                <div class="text-[8px] uppercase opacity-60">Radar Range</div>
                <div class="text-lg font-black">300 KM</div>
            </div>
            <div class="stat-card p-4 rounded-lg border-r-red-500" onclick="window.location.href='cyber.html'">
                <span class="material-symbols-outlined text-red-500 mb-2">bolt</span>
                <div class="text-[8px] uppercase opacity-60">Offensive Ops</div>
                <div class="text-lg font-black text-red-400 italic uppercase">Active</div>
            </div>
        </div>

        <div class="bg-black/60 border border-cyan-500/10 p-4 rounded-lg font-mono text-[9px] h-32 overflow-y-auto">
            <div class="text-cyan-600 mb-1">> SYSTEM INITIALIZED...</div>
            <div class="text-cyan-600 mb-1">> LOADING SOVEREIGN PROTOCOLS... [DONE]</div>
            <div id="dynamic-log" class="text-white"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-2 bg-slate-950/95 backdrop-blur-3xl border-t border-cyan-500/20">
        <div class="flex flex-col items-center justify-center text-black bg-cyan-400 rounded-lg py-2 px-6 shadow-[0_0_20px_#00f2ff]">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[10px] uppercase font-black">DASHBOARD</span>
        </div>
        <button onclick="window.location.href='radar.html'" class="flex flex-col items-center justify-center text-cyan-400/40">
            <span class="material-symbols-outlined">radar</span>
            <span class="text-[9px] uppercase font-bold mt-1">Radar</span>
        </button>
        <button onclick="window.location.href='evolution.html'" class="flex flex-col items-center justify-center text-cyan-400/40">
            <span class="material-symbols-outlined">psychology</span>
            <span class="text-[9px] uppercase font-bold mt-1">Evolution</span>
        </button>
        <button onclick="window.location.href='setup.html'" class="flex flex-col items-center justify-center text-cyan-400/40">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[9px] uppercase font-bold mt-1">Setup</span>
        </button>
    </nav>

    <script>
        function initiateDashboard() {
            // جلب البيانات من التخزين المحلي (التي تم إدخالها في صفحة الإعداد)
            const region = localStorage.getItem('region') || "القطاع المركزي";
            const fieldSector = localStorage.getItem('field_sector') || region;
            
            document.getElementById('sector-display').innerText = fieldSector;
            
            // نداء الترحيب الاستراتيجي
            const msg = `سيادة العقيد علي العماري، مرحباً بك في لوحة القيادة الاستراتيجية. الربط بالأقمار الصناعية نشط بمدى ثلاثمائة كيلومتر. قطاع ${fieldSector} تحت الرصد الكامل.`;
            const utterance = new SpeechSynthesisUtterance(msg);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);

            // تحديث السجل الديناميكي
            setTimeout(() => {
                document.getElementById('dynamic-log').innerText = `> LINK ESTABLISHED WITH SECTOR: ${fieldSector}\n> SATELLITE RANGE ADJUSTED TO 300KM...`;
            }, 1500);
        }
    </script>
</body>
</html>
