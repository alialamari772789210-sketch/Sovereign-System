name: Aegis Sovereign - Unified Strategic Pipeline

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  operational_sync_and_build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build Master Sovereign APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Strategic Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/*.apk
          tag_name: v1.0.8-Release
          name: Aegis Tactical v1.0.8 "Voice Master"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
