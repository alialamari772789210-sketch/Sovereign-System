name: Aegis Sovereign Unified Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      # إجبار النظام على استخدام إصدار Gradle متوافق (8.4)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4' 

      # التنظيف أولاً ثم البناء لحل مشكلة Executor
      - name: Build Master Sovereign APK
        run: gradle clean assembleDebug --stacktrace
