name: Aegis Sovereign Unified Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # يتيح لك التشغيل اليدوي بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # تثبيت الـ NDK لبناء ملفات الـ C++ الموجودة في المجلد (cpp)
      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # استخدام gradle المباشر لتجاوز خطأ Wrapper المفقود
      - name: Build Master Sovereign APK
        run: gradle assembleDebug --stacktrace

      - name: Strategic Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/debug/*.apk
          tag_name: v1.0.8-build-${{ github.run_number }}
          name: Aegis Tactical v1.0.8 "Voice Master"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
