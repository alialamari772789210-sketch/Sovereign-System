name: Aegis Sovereign Sync & Build

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 */6 * * *' # تنفيذ بروتوكول المزامنة كل 6 ساعات تلقائياً
  workflow_dispatch: # تشغيل يدوي بضغطة زر

jobs:
  master_operation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Sovereign Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔄 Execute Kinetic Sync
        run: |
          if [ -f "sync.sh" ]; then
            chmod +x sync.sh
            ./sync.sh
          else
            echo "Sync script not found, proceeding to build phase."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🏗️ Build Master Sovereign APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 🆔 Rename and Finalize
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          mv "$APK_PATH" Aegis_Tactical_v1.0.8_Master_Sovereign.apk
          echo "FINAL_APK=Aegis_Tactical_v1.0.8_Master_Sovereign.apk" >> $GITHUB_ENV

      - name: 🚀 Strategic Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          files: ${{ env.FINAL_APK }}
          tag_name: v1.0.8-Sovereign
          name: Aegis Tactical v1.0.8 "Master Sovereign"
          body: |
            ### 🎖️ Aegis Tactical v1.0.8
            **Architect:** Colonel Ali Al-Ammari
            - تم دمج كافة بروتوكولات المزامنة والبناء.
            - الحالة: جاهز للعمل الميداني.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
