<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نواة التطور والإصلاح الذاتي - مركز الذكاء الاصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #050a14; 
            color: #00f2ff; 
            margin: 0; 
            overflow: hidden;
        }
        .evolution-bg {
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.1) 0%, transparent 80%);
        }
        .core-orb {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.2) 0%, transparent 70%);
            border: 1px solid rgba(0, 242, 255, 0.3);
            position: relative;
            animation: orb-pulse 4s ease-in-out infinite;
        }
        @keyframes orb-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
            50% { transform: scale(1.1); box-shadow: 0 0 50px rgba(0, 242, 255, 0.4); }
        }
        .neural-path {
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f2ff, transparent);
            position: absolute;
            width: 100%;
            animation: stream 2s linear infinite;
        }
        @keyframes stream {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .progress-fill {
            transition: width 2.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="evolution-bg min-h-screen flex flex-col p-6" onload="activateEvolutionCore()">
    
    <header class="flex justify-between items-center mb-8 border-b border-cyan-500/20 pb-4">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-cyan-400 animate-spin-slow">psychology</span>
            <div>
                <h1 class="text-xs font-black tracking-widest uppercase">AI Evolution Core</h1>
                <div class="text-[9px] text-cyan-400/60">SELF_HEALING_PROTOCOL_v7.2.0</div>
            </div>
        </div>
        <div class="text-[9px] font-bold text-green-400 bg-green-950/30 px-2 py-1 rounded border border-green-500/30">
            CORE_INTEGRITY: 98.4%
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center gap-8">
        <div class="core-orb flex items-center justify-center">
            <span class="material-symbols-outlined text-7xl animate-pulse">model_training</span>
            <div class="absolute inset-0 border-4 border-dashed border-cyan-500/10 rounded-full animate-[spin_20s_linear_infinite]"></div>
        </div>

        <div class="w-full max-w-md space-y-5">
            <div class="text-center mb-6">
                <h2 class="text-xl font-bold uppercase tracking-tight">نواة التطور والإصلاح الذاتي</h2>
                <p id="status-text" class="text-[10px] opacity-60 italic mt-1">جاري استدعاء مصفوفة التطور الذكي...</p>
            </div>

            <div class="space-y-4">
                <div class="bg-slate-900/50 p-4 rounded-lg border border-cyan-500/10 relative overflow-hidden">
                    <div class="flex justify-between text-[9px] font-bold mb-2 uppercase">
                        <span>Enemy Tech Analysis / تحليل تقنيات الخصوم</span>
                        <span id="p1-val">0%</span>
                    </div>
                    <div class="h-1.5 bg-cyan-950 rounded-full overflow-hidden">
                        <div id="p1-bar" class="progress-fill h-full bg-cyan-400 w-0 shadow-[0_0_10px_#00f2ff]"></div>
                    </div>
                </div>

                <div class="bg-slate-900/50 p-4 rounded-lg border border-cyan-500/10">
                    <div class="flex justify-between text-[9px] font-bold mb-2 uppercase">
                        <span>Sovereign Defense Evolution / تطور الحماية السيادية</span>
                        <span id="p2-val">0%</span>
                    </div>
                    <div class="h-1.5 bg-cyan-950 rounded-full overflow-hidden">
                        <div id="p2-bar" class="progress-fill h-full bg-green-400 w-0 shadow-[0_0_10px_#4ade80]"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-2 bg-slate-950/95 backdrop-blur-3xl border-t border-cyan-500/20">
        <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center justify-center text-cyan-400/40">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[9px] uppercase font-bold mt-1">Dashboard</span>
        </button>
        <div class="flex flex-col items-center justify-center text-black bg-cyan-400 rounded-lg py-2 px-6 shadow-[0_0_20px_#00f2ff]">
            <span class="material-symbols-outlined">auto_mode</span>
            <span class="text-[10px] uppercase font-black">EVOLUTION</span>
        </div>
        <button onclick="window.location.href='radar.html'" class="flex flex-col items-center justify-center text-cyan-400/40">
            <span class="material-symbols-outlined">radar</span>
            <span class="text-[9px] uppercase font-bold mt-1">Radar</span>
        </button>
    </nav>

    <script>
        function activateEvolutionCore() {
            // 1. النداء الصوتي المحدث
            const voiceMsg = "تنبيه. نواة التطور والإصلاح الذاتي نشطة. الذكاء الاصطناعي يقوم الآن بتحليل تقنيات العدو المرصودة وتطوير بروتوكولات حماية استباقية. تم رفع كفاءة الدفاع الذاتي للمنظومة بنسبة ثمانية وثمانين في المئة.";
            const utterance = new SpeechSynthesisUtterance(voiceMsg);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);

            // 2. تحديث المؤشرات البصرية
            setTimeout(() => {
                document.getElementById('p1-bar').style.width = "94%";
                document.getElementById('p1-val').innerText = "94%";
                document.getElementById('p2-bar').style.width = "88%";
                document.getElementById('p2-val').innerText = "88%";
                document.getElementById('status-text').innerText = "تم تحديث مصفوفة الحماية بنجاح - النظام في حالة تطور مستمر";
            }, 1000);
        }
    </script>
</body>
</html>
