<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الرصد البصري التكتيكي - العقيد علي العماري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; }
        #camera-container { position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* واجهة الرادار البصرية (HUD) */
        .hud-overlay { position: absolute; inset: 0; pointer-events: none; border: 20px solid rgba(0, 242, 255, 0.1); }
        .reticle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150px; height: 150px; border: 2px solid rgba(0, 242, 255, 0.5); border-radius: 50%; }
        .reticle::before { content: ''; position: absolute; top: 50%; left: -20px; right: -20px; height: 1px; background: rgba(0, 242, 255, 0.5); }
        .reticle::after { content: ''; position: absolute; left: 50%; top: -20px; bottom: -20px; width: 1px; background: rgba(0, 242, 255, 0.5); }

        .target-box { position: absolute; border: 2px solid #ff4444; width: 80px; height: 80px; display: none; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .data-panel { position: absolute; top: 20px; left: 20px; color: #00f2ff; font-family: monospace; font-size: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-left: 3px solid #00f2ff; }
    </style>
</head>
<body>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        
        <div class="hud-overlay">
            <div class="data-panel">
                <p>STRAT-COM OPTICAL V1.0</p>
                <p>UNIT: العقيد علي العماري</p>
                <hr class="my-1 border-cyan-900">
                <p>ALT: <span id="pitch">0</span>°</p>
                <p>AZM: <span id="roll">0</span>°</p>
                <p>SCAN: ACTIVE</p>
            </div>

            <div class="reticle"></div>
            <div id="target" class="target-box">
                <span class="absolute -top-5 left-0 text-[8px] bg-red-600 text-white px-1 uppercase">Target Locked</span>
            </div>
        </div>

        <div class="absolute bottom-10 w-full flex justify-center gap-6 px-10">
            <button onclick="captureTarget()" class="w-16 h-16 rounded-full border-4 border-white/30 flex items-center justify-center bg-red-600/20 shadow-[0_0_20px_#ff4444]">
                <span class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-white font-black">REC</span>
            </button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const pitchEl = document.getElementById('pitch');
        const rollEl = document.getElementById('roll');
        const targetBox = document.getElementById('target');

        // 1. تشغيل الكاميرا
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("يرجى السماح بالوصول للكاميرا لتشغيل الرصد البصري.");
            }
        }

        // 2. قراءة الحساسات الحركية (الميل والارتفاع)
        window.addEventListener('deviceorientation', (event) => {
            pitchEl.innerText = Math.round(event.beta); // الارتفاع
            rollEl.innerText = Math.round(event.gamma); // الميل
        });

        // 3. محاكاة رصد هدف (فيزيائياً يتم ربطها لاحقاً بـ TensorFlow.js)
        function captureTarget() {
            targetBox.style.display = 'block';
            targetBox.style.top = (Math.random() * 40 + 30) + '%';
            targetBox.style.left = (Math.random() * 40 + 30) + '%';
            
            const msg = new SpeechSynthesisUtterance("تم الإغلاق البصري على الهدف. جاري تحليل الإحداثيات.");
            msg.lang = 'ar-SA';
            window.speechSynthesis.speak(msg);

            setTimeout(() => {
                targetBox.style.display = 'none';
            }, 5000);
        }

        startCamera();
    </script>
</body>
</html>
